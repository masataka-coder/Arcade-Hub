<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tank Wars - Artillery Battle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="text-white select-none">

    <!-- Game Canvas -->
    <canvas id="gameCanvas"></canvas>

    <!-- Title Screen -->
    <div id="titleScreen"
        class="absolute inset-0 bg-gray-900 bg-opacity-95 flex items-center justify-center z-50 transition-opacity duration-500 overflow-y-auto">
        <div class="text-center max-w-lg px-6 w-full py-10">
            <h1 class="game-font text-4xl md:text-6xl text-yellow-400 mb-4 leading-normal"
                style="text-shadow: 4px 4px 0 #b91c1c;">TANK WARS</h1>
            <p class="text-gray-400 mb-8 text-lg">砲撃バトルゲーム</p>

            <div class="flex justify-center gap-4 mb-8">
                <div class="p-4 bg-gray-800 rounded-lg border border-yellow-600 min-w-[150px]">
                    <div class="text-xs text-yellow-500 mb-1">所持金</div>
                    <div class="text-2xl font-bold text-yellow-300" id="titleGoldDisplay">0 G</div>
                </div>
            </div>

            <div class="space-y-6 bg-gray-800 p-6 rounded-xl border border-gray-700">
                <div>
                    <p class="text-sm uppercase tracking-widest text-gray-500 mb-2">敵の数 (CPUs)</p>
                    <div class="flex items-center gap-4">
                        <span class="text-2xl font-bold w-8" id="cpuCountDisplay">1</span>
                        <input type="range" id="cpuCountInput" min="1" max="10" value="1" class="flex-1">
                    </div>
                </div>

                <button onclick="startGame()"
                    class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 px-8 rounded-lg shadow-[0_4px_0_rgb(30,58,138)] active:shadow-none active:translate-y-[4px] transition-all w-full text-xl">
                    GAME START
                </button>

                <div class="grid grid-cols-2 gap-3 mt-4">
                    <button onclick="openShop()"
                        class="bg-yellow-600 hover:bg-yellow-500 text-white font-bold py-3 px-4 rounded shadow-[0_4px_0_rgb(180,83,9)] active:shadow-none active:translate-y-[4px] transition-all flex items-center justify-center gap-2">
                        <span>🛒</span> ショップ
                    </button>
                    <button onclick="openLab()"
                        class="bg-purple-600 hover:bg-purple-500 text-white font-bold py-3 px-4 rounded shadow-[0_4px_0_rgb(107,33,168)] active:shadow-none active:translate-y-[4px] transition-all flex items-center justify-center gap-2">
                        <span>🧪</span> 研究所
                    </button>
                </div>

                <div class="pt-4 border-t border-gray-700">
                    <button onclick="openDataManager()" class="text-xs text-gray-400 underline hover:text-white">
                        セーブデータの書き出し/読み込み
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Shop Modal -->
    <div id="shopModal" class="hidden absolute inset-0 bg-black bg-opacity-95 flex items-center justify-center z-[60]">
        <div
            class="bg-gray-800 w-full max-w-4xl h-[90vh] md:h-auto md:max-h-[90vh] rounded-lg shadow-2xl flex flex-col border border-gray-600 overflow-hidden">
            <div class="p-6 bg-gray-900 border-b border-gray-700 flex justify-between items-center sticky top-0 z-10">
                <div>
                    <h2 class="game-font text-2xl text-yellow-400">WEAPON SHOP</h2>
                    <p class="text-sm text-gray-400">弾数容量(Cap)の拡張</p>
                </div>
                <div class="text-right">
                    <div class="text-xs text-gray-400">所持金</div>
                    <div class="text-2xl font-bold text-yellow-300" id="shopGoldDisplay">0 G</div>
                </div>
            </div>
            <div class="p-6 overflow-y-auto flex-1 grid grid-cols-1 md:grid-cols-2 gap-4" id="shopItemsContainer">
                <!-- Items injected by JS -->
            </div>
            <div class="p-6 bg-gray-900 border-t border-gray-700 text-center flex justify-between">
                <button onclick="openLab()"
                    class="bg-purple-600 hover:bg-purple-500 text-white font-bold py-3 px-6 rounded text-sm">
                    研究所へ移動
                </button>
                <button onclick="closeModals()"
                    class="bg-gray-600 hover:bg-gray-500 text-white font-bold py-3 px-12 rounded shadow-[0_4px_0_rgb(55,65,81)] active:shadow-none active:translate-y-[4px] transition-all">
                    戻る
                </button>
            </div>
        </div>
    </div>

    <!-- Lab Modal -->
    <div id="labModal" class="hidden absolute inset-0 bg-black bg-opacity-95 flex items-center justify-center z-[60]">
        <div
            class="bg-gray-800 w-full max-w-4xl h-[90vh] md:h-auto md:max-h-[90vh] rounded-lg shadow-2xl flex flex-col border border-gray-600 overflow-hidden">
            <div class="p-6 bg-gray-900 border-b border-gray-700 flex justify-between items-center sticky top-0 z-10">
                <div>
                    <h2 class="game-font text-2xl text-purple-400">RESEARCH LAB</h2>
                    <p class="text-sm text-gray-400">新兵器の発明</p>
                </div>
                <div class="text-right">
                    <div class="text-xs text-gray-400">所持金</div>
                    <div class="text-2xl font-bold text-yellow-300" id="labGoldDisplay">0 G</div>
                </div>
            </div>

            <div class="p-6 overflow-y-auto flex-1 flex flex-col items-center justify-center gap-8">
                <div class="w-full max-w-2xl bg-gray-900 p-6 rounded-xl border border-gray-700">
                    <p class="text-center text-gray-400 mb-6 text-sm">要素を組み合わせて500Gで研究を実行します。<br>成功するとショップに新商品が並びます。</p>

                    <div class="flex flex-col md:flex-row items-center justify-center gap-4 mb-4">
                        <!-- Slot 1 -->
                        <div class="flex-1 w-full">
                            <label class="block text-xs text-blue-400 mb-1 uppercase font-bold">基礎機構 (Base)</label>
                            <select id="labBaseSelect"
                                class="w-full bg-gray-800 border border-blue-500 text-white p-3 rounded text-lg focus:outline-none">
                                <option value="DIRECT">直射 (Direct)</option>
                                <option value="SPREAD">拡散 (Spread)</option>
                                <option value="HEAVY">重量 (Heavy)</option>
                                <option value="GROUND">地上 (Ground)</option>
                                <option value="AIR">空中 (Air)</option>
                                <option value="TRAP">設置 (Trap)</option>
                                <option value="BIO">生物 (Bio)</option>
                                <option value="ENERGY">エネルギー (Energy)</option>
                                <option value="CHAOS">混沌 (Chaos)</option>
                            </select>
                        </div>
                        <div class="text-2xl text-gray-500">+</div>
                        <!-- Slot 2 -->
                        <div class="flex-1 w-full">
                            <label class="block text-xs text-red-400 mb-1 uppercase font-bold">強化要素 (Enhance)</label>
                            <select id="labEnhanceSelect"
                                class="w-full bg-gray-800 border border-red-500 text-white p-3 rounded text-lg focus:outline-none">
                                <option value="KINETIC">物理 (Kinetic)</option>
                                <option value="EXPLOSIVE">爆発 (Explosive)</option>
                                <option value="ELEMENTAL">属性 (Elemental)</option>
                                <option value="TECH">科学 (Tech)</option>
                                <option value="MAGIC">魔法 (Magic)</option>
                                <option value="SONIC">音波 (Sonic)</option>
                                <option value="TIME">時間 (Time)</option>
                                <option value="GRAVITY_E">重力 (Gravity)</option>
                                <option value="PLASMA_E">プラズマ (Plasma)</option>
                            </select>
                        </div>
                    </div>

                    <!-- Prediction Display -->
                    <div class="mb-6 p-3 bg-black bg-opacity-30 rounded border border-gray-700 text-center">
                        <div class="text-xs text-gray-500 mb-1">研究結果予想</div>
                        <div id="labPredictionText" class="font-bold text-lg text-gray-500">？？？</div>
                    </div>

                    <button onclick="conductResearch()"
                        class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-4 rounded-lg shadow-[0_4px_0_rgb(21,128,61)] active:shadow-none active:translate-y-[4px] transition-all text-xl flex items-center justify-center gap-2">
                        <span>💡</span> 発明する (500 G)
                    </button>

                    <div id="researchResult"
                        class="mt-4 text-center min-h-[3rem] flex items-center justify-center font-bold text-lg">
                        <!-- Result Text -->
                    </div>
                </div>

                <div class="w-full max-w-2xl">
                    <h3 class="text-xs text-gray-500 mb-2 uppercase">発明済みリスト</h3>
                    <div id="unlockedList" class="flex flex-wrap gap-2">
                        <!-- filled by js -->
                    </div>
                </div>
            </div>

            <div class="p-6 bg-gray-900 border-t border-gray-700 text-center flex justify-between">
                <button onclick="openShop()"
                    class="bg-yellow-600 hover:bg-yellow-500 text-white font-bold py-3 px-6 rounded text-sm">
                    ショップへ移動
                </button>
                <button onclick="closeModals()"
                    class="bg-gray-600 hover:bg-gray-500 text-white font-bold py-3 px-12 rounded shadow-[0_4px_0_rgb(55,65,81)] active:shadow-none active:translate-y-[4px] transition-all">
                    戻る
                </button>
            </div>
        </div>
    </div>

    <!-- Data Manager Modal -->
    <div id="dataModal" class="hidden absolute inset-0 bg-black bg-opacity-95 flex items-center justify-center z-[70]">
        <div class="bg-gray-800 w-full max-w-lg p-6 rounded-lg border border-gray-600 shadow-2xl">
            <h2 class="game-font text-xl text-white mb-4">DATA MANAGER</h2>

            <div class="mb-6">
                <label class="block text-xs text-gray-400 mb-1">現在のセーブデータ (コピーして保存)</label>
                <textarea id="exportArea" readonly
                    class="w-full h-24 bg-gray-900 border border-gray-700 rounded p-2 text-xs font-mono text-green-400 mb-2 focus:outline-none select-all"></textarea>
                <button onclick="copySaveData()"
                    class="bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold py-2 px-4 rounded w-full">
                    クリップボードにコピー
                </button>
            </div>

            <div class="mb-6 border-t border-gray-700 pt-6">
                <label class="block text-xs text-gray-400 mb-1">セーブデータの読み込み (貼り付け)</label>
                <textarea id="importArea"
                    class="w-full h-24 bg-gray-900 border border-gray-700 rounded p-2 text-xs font-mono text-white mb-2 focus:outline-none focus:border-blue-500"
                    placeholder="ここにデータを貼り付け..."></textarea>
                <button onclick="importSaveData()"
                    class="bg-red-600 hover:bg-red-500 text-white text-xs font-bold py-2 px-4 rounded w-full">
                    データを復元する
                </button>
                <p id="importMsg" class="text-center text-xs mt-2 min-h-[1rem]"></p>
            </div>

            <button onclick="closeModals()"
                class="w-full bg-gray-600 hover:bg-gray-500 text-white font-bold py-3 rounded">
                閉じる
            </button>
        </div>
    </div>

    <!-- UI Overlay -->
    <div id="ui-layer"
        class="hidden absolute bottom-0 left-0 w-full p-4 bg-gray-900 bg-opacity-95 border-t border-gray-700 backdrop-blur-sm transition-transform duration-300 z-40">
        <div class="max-w-5xl mx-auto flex flex-col md:flex-row items-end justify-between gap-4">

            <!-- Left: Controls -->
            <div class="flex-1 w-full grid grid-cols-2 gap-4 mr-4">
                <div class="flex flex-col">
                    <label class="text-xs text-gray-400 mb-1 flex justify-between">
                        <span>角度</span>
                        <span id="angleValue" class="font-bold text-yellow-400">45°</span>
                    </label>
                    <input type="range" id="angleInput" min="0" max="180" value="45" class="w-full">
                </div>
                <div class="flex flex-col">
                    <label class="text-xs text-gray-400 mb-1 flex justify-between">
                        <span>パワー</span>
                        <span id="powerValue" class="font-bold text-red-400">50</span>
                    </label>
                    <input type="range" id="powerInput" min="0" max="100" value="50" class="w-full">
                </div>
            </div>

            <!-- Middle: Weapon Select -->
            <div class="w-full md:w-auto flex flex-col justify-end min-w-[200px]">
                <label class="text-xs text-gray-400 mb-1">武器選択 (残弾/最大)</label>
                <select id="weaponSelect"
                    class="w-full bg-gray-800 text-white border border-gray-600 rounded px-3 py-2 focus:outline-none focus:border-blue-500 text-sm font-mono">
                    <!-- Options injected by JS -->
                </select>
            </div>

            <!-- Right: Action -->
            <div class="flex items-center gap-4 w-full md:w-auto justify-between md:justify-end mt-2 md:mt-0">
                <div class="text-center mr-2">
                    <div class="text-[10px] text-gray-500 uppercase tracking-widest">WIND</div>
                    <div class="flex items-center gap-2 justify-center">
                        <span id="windArrow" class="text-2xl transition-all duration-500 inline-block">→</span>
                        <span id="windValue" class="text-sm font-mono text-cyan-300">0</span>
                    </div>
                </div>
                <button id="fireBtn"
                    class="game-font bg-red-600 hover:bg-red-500 text-white py-3 px-6 rounded shadow-[0_4px_0_rgb(153,27,27)] active:shadow-none active:translate-y-[4px] transition-all disabled:opacity-50 disabled:cursor-not-allowed whitespace-nowrap min-w-[100px]">
                    FIRE!
                </button>
            </div>
        </div>
    </div>

    <!-- HUDs -->
    <div id="playerHud" class="hidden absolute top-4 left-4 flex flex-col gap-2 z-30">
        <div class="bg-gray-800 bg-opacity-80 p-2 rounded border border-blue-500 w-48 shadow-lg">
            <div class="flex justify-between text-xs mb-1">
                <span class="text-blue-400 font-bold">YOU</span>
                <span id="p1HealthText">100%</span>
            </div>
            <div class="w-full bg-gray-700 h-3 rounded-full overflow-hidden">
                <div id="p1HealthBar" class="bg-blue-500 h-full w-full transition-all duration-300"></div>
            </div>
        </div>
    </div>

    <div id="cpuHudContainer"
        class="hidden absolute top-4 right-4 flex flex-col gap-2 z-30 max-h-[90vh] overflow-y-auto pr-2 custom-scroll">
    </div>

    <!-- Turn Indicator -->
    <div id="turnIndicator"
        class="hidden absolute top-20 left-1/2 transform -translate-x-1/2 bg-black bg-opacity-70 px-6 py-2 rounded-full border border-white/20 text-white font-bold animate-pulse pointer-events-none z-30 whitespace-nowrap">
        あなたの番です
    </div>

    <!-- Achievement Toast Container -->
    <div id="achievementContainer" class="fixed top-28 right-4 flex flex-col gap-2 z-[45] pointer-events-none">
    </div>

    <!-- Game Over Modal -->
    <div id="gameOverModal"
        class="hidden absolute inset-0 bg-black bg-opacity-90 flex items-center justify-center z-50 overflow-y-auto">
        <div
            class="text-center p-6 bg-gray-800 border-2 border-yellow-500 rounded-xl max-w-2xl w-full mx-4 shadow-2xl my-8">
            <h2 id="winnerText" class="game-font text-3xl mb-2 text-yellow-400 leading-normal">VICTORY</h2>
            <p id="resultSubtext" class="text-gray-400 text-sm mb-4"></p>

            <!-- Report + Achievements side by side -->
            <div class="flex gap-4 mb-4">
                <!-- Reward Breakdown -->
                <div id="rewardBreakdown"
                    class="bg-gray-900 rounded-lg p-4 border border-gray-700 text-left flex-1 min-w-0">
                    <div class="text-xs text-gray-500 uppercase tracking-widest mb-3 text-center">BATTLE REPORT</div>
                    <div id="rewardLines" class="flex flex-col gap-2">
                        <!-- Filled by JS -->
                    </div>
                    <div class="border-t border-gray-600 mt-3 pt-3">
                        <div id="rewardTotal" class="flex justify-between items-center reward-total">
                            <span class="font-bold text-white">合計</span>
                            <span id="rewardTotalAmount" class="game-font text-xl text-yellow-400">+0 G</span>
                        </div>
                    </div>
                </div>

                <!-- Achievements Earned -->
                <div id="achievementsSummary"
                    class="bg-gray-900 rounded-lg p-4 border border-gray-700 text-left hidden flex-1 min-w-0">
                    <div class="text-xs text-gray-500 uppercase tracking-widest mb-3 text-center">🏆 ACHIEVEMENTS</div>
                    <div id="achievementLines" class="flex flex-wrap gap-2 justify-center">
                        <!-- Filled by JS -->
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-3">
                <button onclick="openShopFromGame()"
                    class="bg-yellow-600 hover:bg-yellow-500 text-white font-bold py-3 px-4 rounded shadow-[0_4px_0_rgb(180,83,9)] active:shadow-none active:translate-y-[4px] transition-all">
                    ショップへ
                </button>
                <button onclick="returnToTitle()"
                    class="bg-gray-600 hover:bg-gray-500 text-white font-bold py-3 px-4 rounded shadow-[0_4px_0_rgb(55,65,81)] active:shadow-none active:translate-y-[4px] transition-all">
                    タイトルへ
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
