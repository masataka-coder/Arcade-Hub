<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>カラフルブロック崩し</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧱</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <div class="lang-toggle">
            <button onclick="setLanguage('ja')" id="lang-ja" class="active">JP</button>
            <button onclick="setLanguage('en')" id="lang-en">EN</button>
        </div>

        <div id="ui-layer">
            <div class="score-board">
                <div>
                    <span id="score-display">SCORE: 0</span>
                    <span id="level-display" style="margin-left: 20px; font-size: 0.8em; color: #aaa;">LV: 1</span>
                </div>
                <span id="lives-display">〇〇〇</span>
            </div>
            <div id="item-status"></div>
        </div>

        <div id="message-overlay">
            <h1 id="title-text" data-i18n="game_title">BLOCK BREAKER</h1>
            <p id="subtitle-text" data-i18n="subtitle_ready">Ready to Play?</p>

            <div id="mode-buttons" class="button-group">
                <button id="normal-btn" data-i18n="mode_normal">NORMAL</button>
                <button id="chaos-btn" data-i18n="mode_chaos">CHAOS!</button>
            </div>
            <button id="action-btn" class="hidden" data-i18n="btn_start">START</button>

            <div class="controls-hint">
                <span data-i18n="hint_move">Move</span>: <span class="key">←</span> <span class="key">→</span> / <span
                    data-i18n="hint_launch">Launch</span>: <span class="key">↑</span>
            </div>
            <button id="back-portal-btn" class="back-portal-btn" onclick="location.href='../../index.html'"
                data-i18n="btn_top">BACK TO PORTAL</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
