<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL A: 監視モニター</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* スキャンラインエフェクト */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 50;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .crt-flicker {
            animation: textShadow 1.6s infinite;
        }

        @keyframes textShadow {
            0% {
                text-shadow: 0.4389924193300864px 0 1px rgba(0, 30, 255, 0.5), -0.4389924193300864px 0 1px rgba(255, 0, 80, 0.3), 0 0 3px;
            }

            5% {
                text-shadow: 2.7928974010788217px 0 1px rgba(0, 30, 255, 0.5), -2.7928974010788217px 0 1px rgba(255, 0, 80, 0.3), 0 0 3px;
            }

            /* 中略・ランダムなフリッカー */
            100% {
                text-shadow: 0.4389924193300864px 0 1px rgba(0, 30, 255, 0.5), -0.4389924193300864px 0 1px rgba(255, 0, 80, 0.3), 0 0 3px;
            }
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        .animate-blink {
            animation: blink 1s step-end infinite;
        }
    </style>
</head>

<body
    class="bg-gray-900 text-green-400 font-mono h-screen flex flex-col overflow-hidden relative selection:bg-green-900 selection:text-white">

    <!-- ヘッダー -->
    <header
        class="p-4 border-b border-green-800 flex justify-between items-center z-10 bg-gray-900 shadow-[0_0_15px_rgba(0,255,0,0.2)]">
        <div>
            <h1 class="text-2xl font-bold tracking-widest crt-flicker">SECURE_CAM_01 <span
                    class="text-xs text-green-600 animate-pulse">● REC</span></h1>
            <p class="text-xs text-green-700 mt-1">SECTOR: CLASSIFIED // SYSTEM: ONLINE</p>
        </div>
        <div class="text-right">
            <p class="text-sm">INTRUSION DETECT LEVEL: <span id="alert-level"
                    class="text-green-500 font-bold">LOW</span></p>
            <p class="text-xs text-gray-500 mt-1" id="clock">00:00:00</p>
        </div>
    </header>

    <!-- メインディスプレイ -->
    <main class="flex-1 flex flex-col items-center justify-center relative p-8 z-10">
        <div id="camera-view"
            class="w-full max-w-4xl aspect-video border-2 border-green-800 rounded-lg relative overflow-hidden flex items-center justify-center transition-colors duration-300">
            <!-- グリッド背景 -->
            <div class="absolute inset-0 opacity-20"
                style="background-image: linear-gradient(to right, #0f401f 1px, transparent 1px), linear-gradient(to bottom, #0f401f 1px, transparent 1px); background-size: 40px 40px;">
            </div>

            <!-- 状態テキスト -->
            <div id="status-text"
                class="text-6xl font-bold tracking-[0.2em] z-20 text-center crt-flicker mix-blend-screen">
                SYSTEM STANDBY
            </div>

            <!-- 危険時のオーバーレイ -->
            <div id="danger-overlay" class="absolute inset-0 bg-red-600/20 hidden pointer-events-none"></div>
            <!-- アイコンエリア -->
            <div id="icon-area"
                class="absolute inset-0 flex items-center justify-center opacity-10 pointer-events-none">
                <!-- 目のアイコン(デフォルト非表示) -->
                <svg id="eye-icon" class="w-64 h-64 text-red-500 hidden" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1"
                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
                    </path>
                </svg>
            </div>
        </div>

        <!-- ログ出力エリア -->
        <div class="w-full max-w-4xl mt-4 bg-black/50 border border-green-900 p-2 h-32 overflow-y-auto text-xs"
            id="log-container">
            <div class="text-green-700">> SYSTEM INITIALIZED. WAITING FOR AGENT CONNECTION...</div>
        </div>

        <!-- スタートボタン -->
        <button id="btn-start"
            class="mt-8 px-8 py-3 bg-green-900/50 border border-green-500 text-green-400 hover:bg-green-500 hover:text-black transition-colors font-bold tracking-widest uppercase shadow-[0_0_10px_rgba(0,255,0,0.5)]">
            INITIATE PROTOCOL (START)
        </button>
    </main>

    <script>
        // --- ゲームのロジックを司るホスト側 ---

        const STATE_KEY = 'spy_game_host_state';
        const ACTION_KEY = 'spy_game_agent_action';

        let gameState = 'STANDBY'; // STANDBY, SAFE, DANGER, GAMEOVER, CLEAR
        let loopTimer = null;
        let progress = 0;
        const GOAL_STEPS = 5; // クリアに必要な移動回数

        // UI要素
        const viewEl = document.getElementById('camera-view');
        const statusTextEl = document.getElementById('status-text');
        const overlayEl = document.getElementById('danger-overlay');
        const eyeIconEl = document.getElementById('eye-icon');
        const logEl = document.getElementById('log-container');
        const startBtn = document.getElementById('btn-start');
        const alertLevelEl = document.getElementById('alert-level');

        // 時計の更新
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toISOString().split('T')[1].slice(0, 8);
        }, 1000);

        function log(msg, type = 'info') {
            const div = document.createElement('div');
            const time = new Date().toISOString().split('T')[1].slice(0, 8);
            div.innerText = `[${time}] > ${msg}`;
            if (type === 'error') div.className = 'text-red-500';
            if (type === 'warn') div.className = 'text-yellow-500';
            logEl.appendChild(div);
            logEl.scrollTop = logEl.scrollHeight;
        }

        // 状態をローカルストレージに送信（タブBに知らせる）
        function broadcastState() {
            const data = { state: gameState, progress: progress, max: GOAL_STEPS, ts: Date.now() };
            localStorage.setItem(STATE_KEY, JSON.stringify(data));
        }

        function setCameraState(newState) {
            if (gameState === 'GAMEOVER' || gameState === 'CLEAR') return;
            gameState = newState;

            viewEl.className = 'w-full max-w-4xl aspect-video border-2 rounded-lg relative overflow-hidden flex items-center justify-center transition-colors duration-300';

            if (newState === 'SAFE') {
                viewEl.classList.add('border-green-800', 'bg-transparent');
                statusTextEl.innerText = "CAMERA FACING AWAY\n(CLEAR TO MOVE)";
                statusTextEl.className = 'text-4xl font-bold tracking-[0.2em] z-20 text-center text-green-500 crt-flicker opacity-50';
                overlayEl.classList.add('hidden');
                eyeIconEl.classList.add('hidden');
                alertLevelEl.innerText = "LOW";
                alertLevelEl.className = "text-green-500 font-bold";
                log("Camera is panning left. Sector clear.");

                // 次の状態変更のタイマー（2秒〜4秒後）
                loopTimer = setTimeout(() => setCameraState('DANGER'), Math.random() * 2000 + 2000);

            } else if (newState === 'DANGER') {
                viewEl.classList.add('border-red-600', 'bg-red-900/20');
                statusTextEl.innerText = "WARNING\nMONITORING THIS SECTOR";
                statusTextEl.className = 'text-5xl font-bold tracking-[0.1em] z-20 text-center text-red-500 animate-pulse';
                overlayEl.classList.remove('hidden');
                eyeIconEl.classList.remove('hidden');
                alertLevelEl.innerText = "CRITICAL";
                alertLevelEl.className = "text-red-500 font-bold animate-blink";
                log("Camera is facing this sector. MOTION SENSORS ACTIVE.", "warn");

                // 次の状態変更のタイマー（1.5秒〜3秒後）
                loopTimer = setTimeout(() => setCameraState('SAFE'), Math.random() * 1500 + 1500);
            }
            broadcastState();
        }

        function triggerGameOver() {
            clearTimeout(loopTimer);
            gameState = 'GAMEOVER';
            viewEl.className = 'w-full max-w-4xl aspect-video border-4 border-red-600 bg-red-900 relative overflow-hidden flex items-center justify-center';
            statusTextEl.innerText = "INTRUDER DETECTED\nMISSION FAILED";
            statusTextEl.className = 'text-6xl font-bold tracking-widest z-20 text-center text-white';
            overlayEl.classList.remove('hidden');
            eyeIconEl.classList.remove('hidden');
            log("SECURITY BREACH DETECTED! ALARM ACTIVATED!", "error");
            broadcastState();
            startBtn.innerText = "REBOOT SYSTEM (RETRY)";
            startBtn.style.display = 'block';
        }

        function triggerClear() {
            clearTimeout(loopTimer);
            gameState = 'CLEAR';
            viewEl.className = 'w-full max-w-4xl aspect-video border-4 border-blue-500 bg-blue-900/30 relative overflow-hidden flex items-center justify-center';
            statusTextEl.innerText = "INFILTRATION SUCCESSFUL\nDATA ACQUIRED";
            statusTextEl.className = 'text-5xl font-bold tracking-widest z-20 text-center text-blue-400 crt-flicker';
            overlayEl.classList.add('hidden');
            eyeIconEl.classList.add('hidden');
            log("Agent has successfully bypassed all security measures.", "info");
            broadcastState();
            startBtn.innerText = "NEW MISSION (RESTART)";
            startBtn.style.display = 'block';
        }

        // ゲーム開始
        function startGame() {
            logEl.innerHTML = '';
            log("INITIALIZING CAMERA OVERRIDE PROTOCOL...");
            progress = 0;
            startBtn.style.display = 'none';

            // 少し待ってから開始
            setTimeout(() => {
                log("LINK ESTABLISHED. COMMENCING SURVEILLANCE.");
                setCameraState('SAFE');
            }, 1500);
        }

        startBtn.addEventListener('click', startGame);

        // タブB（エージェント）からのアクションを受信
        window.addEventListener('storage', (e) => {
            if (e.key === ACTION_KEY && e.newValue) {
                const actionData = JSON.parse(e.newValue);

                if (gameState === 'GAMEOVER' || gameState === 'CLEAR' || gameState === 'STANDBY') return;

                log(`Agent action received: ${actionData.action}`);

                if (gameState === 'DANGER') {
                    // 危険時に動いた！
                    triggerGameOver();
                } else if (gameState === 'SAFE') {
                    // 安全時に動いた！
                    progress++;
                    log(`Agent advanced. Progress: ${progress}/${GOAL_STEPS}`);
                    if (progress >= GOAL_STEPS) {
                        triggerClear();
                    } else {
                        broadcastState(); // プログレス更新を送信
                    }
                }
            }
        });

        // ロード時にストレージを初期化（前回のゴミを残さない）
        localStorage.removeItem(STATE_KEY);
        localStorage.removeItem(ACTION_KEY);
        broadcastState();

    </script>
</body>

</html>
