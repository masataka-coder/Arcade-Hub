<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL A: 監視モニター</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --accent-color: #00ff41;
            --bg-color: #0a0a0a;
            --danger-color: #ff0000;
        }

        /* 全体オーバーレイ */
        .monitor-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 50;
        }

        /* 走査線 */
        .scanlines {
            background: linear-gradient(
                to bottom,
                rgba(18, 16, 16, 0) 50%,
                rgba(0, 0, 0, 0.15) 50%
            );
            background-size: 100% 4px;
        }

        /* ノイズ（スタティック） */
        .noise {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3%3Ffilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.08;
            animation: noise-move 0.2s steps(2) infinite;
        }

        @keyframes noise-move {
            0% { transform: translate(0, 0); }
            50% { transform: translate(-5px, -5px); }
            100% { transform: translate(5px, 5px); }
        }

        /* ビネット */
        .vignette {
            background: radial-gradient(circle, transparent 50%, rgba(0,0,0,0.6) 100%);
        }

        /* 色収差 */
        .chromatic-aberration {
            animation: chromatic 0.5s infinite alternate;
        }

        @keyframes chromatic {
            0% { text-shadow: -1px 0 #f00, 1px 0 #0ff; }
            100% { text-shadow: -1.5px 0 #f00, 1.5px 0 #0ff; }
        }

        /* 廊下の背景シミュレーション */
        .corridor-bg {
            perspective: 1000px;
            background-color: #1a1a1a;
        }

        .wall {
            position: absolute;
            background: linear-gradient(to right, #222, #111);
            border: 1px solid #333;
        }

        .wall-left {
            width: 300%; height: 100%;
            left: -150%;
            transform: rotateY(90deg) translateZ(-400px);
            background: repeating-linear-gradient(90deg, #222, #222 100px, #1a1a1a 100px, #1a1a1a 200px);
        }

        .wall-right {
            width: 300%; height: 100%;
            right: -150%;
            transform: rotateY(-90deg) translateZ(-400px);
            background: repeating-linear-gradient(90deg, #222, #222 100px, #1a1a1a 100px, #1a1a1a 200px);
        }

        .floor {
            width: 300%; height: 100%;
            bottom: -50%; left: -100%;
            transform: rotateX(90deg);
            background: repeating-linear-gradient(0deg, #111, #111 50px, #0a0a0a 50px, #0a0a0a 100px);
        }

        .ceiling {
            width: 300%; height: 100%;
            top: -50%; left: -100%;
            transform: rotateX(-90deg);
            background: #111;
        }

        #corridor-container {
            transition: transform 2s ease-in-out;
        }

        /* グリッチ効果 */
        .glitch {
            animation: glitch-anim 0.2s cubic-bezier(.25,.46,.45,.94) both infinite;
        }

        @keyframes glitch-anim {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        .animate-blink {
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>

<body
    class="bg-black text-green-400 font-mono h-screen flex flex-col overflow-hidden relative selection:bg-green-900 selection:text-white">

    <!-- モニターオーバーレイ層 -->
    <div class="monitor-overlay scanlines"></div>
    <div class="monitor-overlay noise"></div>
    <div class="monitor-overlay vignette"></div>

    <!-- ヘッダー -->
    <header
        class="p-4 border-b border-green-900 flex justify-between items-center z-20 bg-black/80 backdrop-blur-sm">
        <div>
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 rounded-full bg-red-600 animate-pulse shadow-[0_0_8px_#f00]"></div>
                <h1 class="text-xl font-bold tracking-tighter chromatic-aberration">SECURE_CAM_01 [LIVE]</h1>
            </div>
            <p class="text-[10px] text-green-800 mt-1 uppercase">Sector: 7-G / Internal Corridor / Low-Light Mode</p>
        </div>
        <div class="text-right">
            <p class="text-[10px] uppercase text-green-800">Sensors: <span id="alert-level" class="text-green-500 font-bold">NORMAL</span></p>
            <p class="text-xs font-bold" id="clock">00:00:00.00</p>
        </div>
    </header>

    <!-- メインディスプレイ -->
    <main class="flex-1 flex flex-col items-center justify-center relative p-4 z-10 bg-[#050505]">
        <div id="camera-view"
            class="w-full max-w-5xl aspect-video border border-green-900/50 rounded-sm relative overflow-hidden flex items-center justify-center bg-black shadow-[inset_0_0_100px_rgba(0,0,0,1)]">
            
            <!-- カメラ映像（シミュレーション） -->
            <div id="corridor-container" class="absolute inset-0 corridor-bg overflow-hidden flex items-center justify-center">
                <div class="ceiling"></div>
                <div class="floor"></div>
                <div class="wall wall-left"></div>
                <div class="wall wall-right"></div>
                
                <!-- 遠くのドアや光のシミュレーション -->
                <div class="absolute w-20 h-40 bg-green-900/10 border border-green-500/10 blur-sm"></div>
            </div>

            <!-- UIオーバーレイ（カメラ内UI） -->
            <div class="absolute inset-0 p-6 flex flex-col justify-between pointer-events-none z-30 font-bold opacity-60">
                <div class="flex justify-between items-start text-[12px] tracking-widest">
                    <div>
                        <p>16:9 1080P 30FPS</p>
                        <p>ISO 3200 +1.0EV</p>
                    </div>
                    <div class="text-right">
                        <p>AUTO STBY: OFF</p>
                        <p>BAT: ▮▮▮▮▯ 82%</p>
                    </div>
                </div>
                
                <!-- 状態テキスト -->
                <div id="status-text"
                    class="text-4xl font-black tracking-[0.3em] text-center chromatic-aberration drop-shadow-2xl">
                    SYSTEM STANDBY
                </div>

                <div class="flex justify-between items-end text-[12px]">
                    <div class="border-l-2 border-b-2 w-8 h-8 opacity-40"></div>
                    <div class="text-center pb-2">
                        <div class="flex items-center gap-2 justify-center mb-1">
                            <span class="text-[10px] text-cyan-500 font-bold">JAM ENERGY:</span>
                            <div class="w-32 h-2 bg-gray-900 border border-cyan-900/50 relative overflow-hidden">
                                <div id="jam-energy-bar" class="absolute inset-y-0 left-0 bg-cyan-500 w-0 transition-all duration-300"></div>
                            </div>
                            <span id="jam-energy-text" class="text-[10px] text-cyan-500 w-8">0%</span>
                        </div>
                        <p id="cam-coords">X: 124.5 Y: 042.1</p>
                        <div class="w-48 h-1 bg-green-950 mt-1 relative overflow-hidden">
                            <div class="absolute inset-y-0 left-0 bg-green-500 w-1/3" id="progress-bar"></div>
                        </div>
                    </div>
                    <div class="border-r-2 border-b-2 w-8 h-8 opacity-40"></div>
                </div>
            </div>

            <!-- ジャミング時のオーバーレイ -->
            <div id="jam-overlay" class="absolute inset-0 bg-cyan-600/30 backdrop-blur-[2px] hidden pointer-events-none z-45 flex items-center justify-center">
                <div class="text-4xl font-black text-cyan-400 tracking-[0.5em] animate-pulse glitch">CAMERA JAMMED</div>
            </div>

            <!-- 危険時のオーバーレイ -->
            <div id="danger-overlay" class="absolute inset-0 bg-red-950/20 mix-blend-overlay hidden pointer-events-none z-40"></div>
            
            <!-- 視覚的な中心ガイド -->
            <div class="absolute w-4 h-4 border-t border-l border-green-500/30 top-1/2 left-1/2 -translate-x-6 -translate-y-6"></div>
            <div class="absolute w-4 h-4 border-b border-r border-green-500/30 top-1/2 left-1/2 translate-x-2 translate-y-2"></div>
            <!-- アイコンエリア -->
            <div id="icon-area"
                class="absolute inset-0 flex items-center justify-center opacity-10 pointer-events-none">
                <!-- 目のアイコン(デフォルト非表示) -->
                <svg id="eye-icon" class="w-64 h-64 text-red-500 hidden" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1"
                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
                    </path>
                </svg>
            </div>
        </div>

        <!-- ログ出力エリア -->
        <div class="w-full max-w-4xl mt-4 bg-black/50 border border-green-900 p-2 h-32 overflow-y-auto text-xs"
            id="log-container">
            <div class="text-green-700">> SYSTEM INITIALIZED. WAITING FOR AGENT CONNECTION...</div>
        </div>

        <!-- スタートボタン / ハッキング入力 -->
        <div class="flex gap-4 mt-8">
            <button id="btn-start"
                class="px-8 py-3 bg-green-900/50 border border-green-500 text-green-400 hover:bg-green-500 hover:text-black transition-colors font-bold tracking-widest uppercase shadow-[0_0_10px_rgba(0,255,0,0.5)]">
                INITIATE PROTOCOL
            </button>
            <div id="hacking-area" class="hidden flex items-center gap-4 bg-cyan-950/20 border border-cyan-800 p-1 pl-4 rounded">
                <span class="text-xs text-cyan-400 font-bold tracking-widest uppercase">Bypass Key:</span>
                <button id="btn-generate" class="px-6 py-2 bg-cyan-900/50 border border-cyan-500 text-cyan-400 hover:bg-cyan-500 hover:text-black transition-all font-black text-xs uppercase animate-pulse">
                    [ SPACE ] GENERATE BYPASS DATA
                </button>
            </div>
        </div>
    </main>

    <script>
        // --- ゲームのロジックを司るホスト側 ---

        const STATE_KEY = 'spy_game_host_state';
        const ACTION_KEY = 'spy_game_agent_action';

        let gameState = 'STANDBY'; // STANDBY, SAFE, DANGER, GAMEOVER, CLEAR
        let loopTimer = null;
        let progress = 0;
        let jamEnergy = 0;
        let isJammed = false;
        const GOAL_STEPS = 5; // クリアに必要な移動回数
        const JAM_COST = 40; // ジャミングに必要なエネルギー
        const JAM_DURATION = 3000; // ジャミングの持続時間 (ms)

        // UI要素
        const viewEl = document.getElementById('camera-view');
        const statusTextEl = document.getElementById('status-text');
        const corridorEl = document.getElementById('corridor-container');
        const progressBarEl = document.getElementById('progress-bar');
        const jamEnergyBarEl = document.getElementById('jam-energy-bar');
        const jamEnergyTextEl = document.getElementById('jam-energy-text');
        const jamOverlayEl = document.getElementById('jam-overlay');
        const camCoordsEl = document.getElementById('cam-coords');
        const overlayEl = document.getElementById('danger-overlay');
        const logEl = document.getElementById('log-container');
        const startBtn = document.getElementById('btn-start');
        const alertLevelEl = document.getElementById('alert-level');
        const hackingAreaEl = document.getElementById('hacking-area');
        const btnGenerateEl = document.getElementById('btn-generate');

        // 時計と座標の更新
        function updateHUD() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            const ms = String(now.getMilliseconds()).slice(0, 2).padStart(2, '0');
            document.getElementById('clock').innerText = `${h}:${m}:${s}.${ms}`;

            // 座標をわずかに揺らす
            const rx = (124.5 + (Math.random() - 0.5) * 0.2).toFixed(1);
            const ry = (42.1 + (Math.random() - 0.5) * 0.2).toFixed(1);
            camCoordsEl.innerText = `X: ${rx} Y: ${ry}`;

            requestAnimationFrame(updateHUD);
        }
        requestAnimationFrame(updateHUD);

        // ジャミングエネルギーの生成
        function generateEnergy() {
            if (gameState === 'GAMEOVER' || gameState === 'CLEAR' || gameState === 'STANDBY') return;
            jamEnergy = Math.min(100, jamEnergy + 5);
            updateEnergyUI();
            broadcastState();
        }

        function updateEnergyUI() {
            jamEnergyBarEl.style.width = `${jamEnergy}%`;
            jamEnergyTextEl.innerText = `${Math.floor(jamEnergy)}%`;
            if (jamEnergy >= JAM_COST) {
                jamEnergyBarEl.className = "absolute inset-y-0 left-0 bg-cyan-400 w-0 transition-all duration-300 shadow-[0_0_10px_#22d3ee]";
            } else {
                jamEnergyBarEl.className = "absolute inset-y-0 left-0 bg-cyan-600 w-0 transition-all duration-300";
            }
        }

        btnGenerateEl.addEventListener('click', generateEnergy);
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                generateEnergy();
                btnGenerateEl.classList.remove('animate-pulse');
                setTimeout(() => btnGenerateEl.classList.add('animate-pulse'), 50);
            }
        });

        // ランダムなノイズ/グリッチの演出
        function triggerGlitch() {
            if (Math.random() > 0.98 || isJammed) {
                document.body.classList.add('glitch');
                setTimeout(() => { if(!isJammed) document.body.classList.remove('glitch') }, 100 + Math.random() * 200);
            }
            setTimeout(triggerGlitch, isJammed ? 100 : 1000 + Math.random() * 5000);
        }
        triggerGlitch();

        function log(msg, type = 'info') {
            const div = document.createElement('div');
            const time = new Date().toISOString().split('T')[1].slice(0, 8);
            div.innerText = `[${time}] > ${msg}`;
            if (type === 'error') div.className = 'text-red-500 font-bold';
            if (type === 'warn') div.className = 'text-yellow-500';
            if (type === 'cyan') div.className = 'text-cyan-400 font-bold';
            logEl.appendChild(div);
            logEl.scrollTop = logEl.scrollHeight;
        }

        function broadcastState() {
            const data = { 
                state: gameState, 
                progress: progress, 
                max: GOAL_STEPS, 
                jamEnergy: jamEnergy,
                jamCost: JAM_COST,
                isJammed: isJammed,
                ts: Date.now() 
            };
            localStorage.setItem(STATE_KEY, JSON.stringify(data));
            
            // プログレスバーの更新
            progressBarEl.style.width = `${(progress / GOAL_STEPS) * 100}%`;
        }

        function setCameraState(newState) {
            if (gameState === 'GAMEOVER' || gameState === 'CLEAR' || isJammed) return;
            gameState = newState;

            if (newState === 'SAFE') {
                statusTextEl.innerText = "CAMERA PANNING LEFT\n[AREA CLEAR]";
                statusTextEl.className = 'text-3xl font-black tracking-[0.2em] text-green-500 opacity-60';
                overlayEl.classList.add('hidden');
                alertLevelEl.innerText = "NORMAL";
                alertLevelEl.className = "text-green-500 font-bold";
                corridorEl.style.transform = 'translateX(20%) scale(1.1)'; // 横を向く
                log("Camera is panning left. Sector clear.");

                loopTimer = setTimeout(() => setCameraState('DANGER'), Math.random() * 2000 + 1500);

            } else if (newState === 'DANGER') {
                statusTextEl.innerText = "MOTION DETECTED\n[MONITORING]";
                statusTextEl.className = 'text-4xl font-black tracking-[0.1em] text-red-600 animate-pulse';
                overlayEl.classList.remove('hidden');
                alertLevelEl.innerText = "CRITICAL";
                alertLevelEl.className = "text-red-600 font-bold animate-blink";
                corridorEl.style.transform = 'translateX(0%) scale(1)'; // 正面を向く
                log("Motion sensors active. Monitoring corridor entrance.", "warn");

                loopTimer = setTimeout(() => setCameraState('SAFE'), Math.random() * 1500 + 1000);
            }
            broadcastState();
        }

        function triggerJamming() {
            if (isJammed || jamEnergy < JAM_COST) return;
            
            isJammed = true;
            jamEnergy -= JAM_COST;
            updateEnergyUI();
            
            clearTimeout(loopTimer);
            jamOverlayEl.classList.remove('hidden');
            overlayEl.classList.add('hidden');
            document.body.classList.add('glitch');
            
            log("EXTERNAL SIGNAL INTERFERENCE DETECTED. CAMERA OFFLINE.", "cyan");
            broadcastState();

            setTimeout(() => {
                isJammed = false;
                jamOverlayEl.classList.add('hidden');
                document.body.classList.remove('glitch');
                log("SIGNAL RESTORED. REBOOTING CAMERA SENSORS...");
                broadcastState();
                
                // 少し待ってから通常ルーチン再開
                setTimeout(() => {
                    setCameraState('SAFE');
                }, 1000);
            }, JAM_DURATION);
        }

        function triggerGameOver() {
            clearTimeout(loopTimer);
            gameState = 'GAMEOVER';
            statusTextEl.innerText = "INTERCEPTED\nINTRUDER DETECTED";
            statusTextEl.className = 'text-5xl font-black tracking-widest text-red-500 glitch';
            overlayEl.classList.remove('hidden');
            overlayEl.className = "absolute inset-0 bg-red-600/40 z-40";
            log("SECURITY BREACH! AGENT ELIMINATED!", "error");
            broadcastState();
            startBtn.innerText = "RESTORE SYSTEM (RETRY)";
            startBtn.style.display = 'block';
        }

        function triggerClear() {
            clearTimeout(loopTimer);
            gameState = 'CLEAR';
            statusTextEl.innerText = "OBJECTIVE SECURED\nSIGNAL LOST...";
            statusTextEl.className = 'text-4xl font-black tracking-widest text-blue-400 chromatic-aberration';
            overlayEl.classList.add('hidden');
            log("Agent extraction successful. Connection terminated.", "info");
            broadcastState();
            startBtn.innerText = "NEXT SECTOR (RESTART)";
            startBtn.style.display = 'block';
        }

        function startGame() {
            logEl.innerHTML = '';
            log("ESTABLISHING ENCRYPTED LINK...");
            progress = 0;
            jamEnergy = 0;
            isJammed = false;
            updateEnergyUI();
            progressBarEl.style.width = '0%';
            startBtn.style.display = 'none';
            hackingAreaEl.classList.remove('hidden');

            setTimeout(() => {
                log("FEED CONNECTED. SECTOR 7-G LIVE.");
                setCameraState('SAFE');
            }, 1000);
        }

        startBtn.addEventListener('click', startGame);

        window.addEventListener('storage', (e) => {
            if (e.key === ACTION_KEY && e.newValue) {
                const actionData = JSON.parse(e.newValue);
                if (gameState === 'GAMEOVER' || gameState === 'CLEAR' || gameState === 'STANDBY') return;

                log(`Agent pulse detected.`);

                if (actionData.action === 'JAM') {
                    triggerJamming();
                    return;
                }

                if (gameState === 'DANGER') {
                    triggerGameOver();
                } else if (gameState === 'SAFE') {
                    progress++;
                    log(`Agent advanced. Distance remaining: ${GOAL_STEPS - progress}m`);
                    if (progress >= GOAL_STEPS) {
                        triggerClear();
                    } else {
                        broadcastState();
                    }
                }
            }
        });

        localStorage.removeItem(STATE_KEY);
        localStorage.removeItem(ACTION_KEY);
        broadcastState();

    </script>
</body>

</html>
