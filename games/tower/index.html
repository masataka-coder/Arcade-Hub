<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Stage Tower Defense</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Reverse S Tower Defense</h1>

    <!-- タイトル画面 -->
    <div id="title-screen" class="screen active">
        <h2>SELECT STAGE</h2>
        <button class="stage-btn" onclick="initGame(1)">Stage 1: Reverse S</button>
        <button class="stage-btn" onclick="initGame(2)">Stage 2: Spiral</button>
        <button class="stage-btn" onclick="initGame(3)">Stage 3: Zigzag</button>
    </div>

    <!-- ゲームコンテナ -->
    <div id="game-container">

        <div id="ui-header">
            <div class="stat-group">
                <span id="score-display">💰 100</span>
                <span id="base-hp-display">🏰 HP: 20</span>
            </div>
            <div class="stat-group">
                <span id="wave-display">🌊 Wave: 1</span>
            </div>
        </div>

        <div style="position: relative;">
            <canvas id="gameCanvas" width="800" height="600"></canvas>
            <div id="message-area">BOSS WAVE!</div>

            <div id="game-over">
                <h2 id="game-over-title">GAME OVER</h2>
                <p id="final-score">Reached Wave: 5</p>
                <button onclick="resetGame()">Retry</button>
                <button onclick="returnToTitle()">Title</button>
            </div>
        </div>

        <div id="controls">
            <!-- モード切替タブ -->
            <div class="tab-row">
                <button id="tab-build" class="tab-btn active" onclick="switchMode('build')">🔨 Build</button>
                <button id="tab-research" class="tab-btn" onclick="switchMode('research')">🧪 Research</button>
                <button id="tab-inspect" class="tab-btn" style="display:none;" onclick="switchMode('inspect')">🔍
                    Inspect</button>
            </div>

            <!-- パネルエリア (高さ固定) -->
            <div class="panel-area">

                <!-- 設置モード用パネル -->
                <div id="build-panel" class="panel-content active">
                    <button id="btn-standard" class="active tower-btn" onclick="selectTower('standard')">🔫 Standard
                        ($50)</button>
                    <button id="btn-sniper" class="tower-btn" onclick="selectTower('sniper')">🎯 Sniper ($120)</button>
                    <button id="btn-missile" class="tower-btn" onclick="selectTower('missile')">🚀 Missile
                        ($150)</button>
                    <button id="btn-rapid" class="tower-btn" onclick="selectTower('rapid')">⚡ Rapid ($200)</button>
                    <button id="btn-poison" class="tower-btn locked" onclick="selectTower('poison')">☠️ Poison
                        ($350)</button>
                    <button id="btn-heater" class="tower-btn locked" onclick="selectTower('heater')">🔥 Heater
                        ($600)</button>
                    <button id="btn-freeze" class="tower-btn locked" onclick="selectTower('freeze')">🥶 Freeze
                        ($500)</button>
                    <button id="btn-beam" class="tower-btn locked" onclick="selectTower('beam')">⚡ Beam ($1000)</button>
                    <button id="btn-mine" class="tower-btn" onclick="selectTower('mine')">💣 Mine ($100)</button>
                </div>

                <!-- 研究モード用パネル -->
                <div id="research-panel" class="panel-content">
                    <button id="btn-res-damage" class="research-btn" onclick="doResearch('damage')">
                        <span>⚔️ Power Up</span> <span id="cost-damage">$300</span>
                    </button>
                    <button id="btn-res-speed" class="research-btn" onclick="doResearch('speed')">
                        <span>⚡ Haste</span> <span id="cost-speed">$300</span>
                    </button>
                    <button id="btn-res-range" class="research-btn" onclick="doResearch('range')">
                        <span>🎯 Scope</span> <span id="cost-range">$300</span>
                    </button>
                    <button id="btn-res-defense" class="research-btn" onclick="doResearch('defense')">
                        <span>🛡️ Shield</span> <span id="cost-defense">$300</span>
                    </button>
                </div>

                <!-- 選択モード用パネル -->
                <div id="inspect-panel" class="panel-content">
                    <div id="inspect-status">Selected: Standard (HP: 200/200)</div>
                    <div id="inspect-buttons"
                        style="display:flex; flex-wrap:wrap; justify-content:center; gap:8px; width:100%;">
                        <!-- JSで動的にボタン挿入 -->
                    </div>
                </div>
            </div>

            <!-- 共通コントロール -->
            <div class="common-controls">
                <button id="btn-all-repair" class="all-repair-btn" onclick="repairAll()">🔧 All Repair</button>
                <button id="start-wave" onclick="startGame()">Next Wave</button>
                <button class="utility-btn" onclick="saveGame()">💾 SAVE</button>
                <button class="utility-btn" onclick="loadGame()">📂 LOAD</button>
                <button class="back-btn" onclick="returnToTitle()">↩ TOP</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</html>
