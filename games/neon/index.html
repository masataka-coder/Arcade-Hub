<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ネオンストライク - 宇宙シューティング</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../style.css">
    <!-- Root style for consistent feeling if needed, but the game has its own. Let's use game's style.css -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="text-white font-sans">

    <!-- フラッシュエフェクト用レイヤー -->
    <div id="flashLayer" class="absolute inset-0 pointer-events-none z-10"></div>

    <!-- ゲーム内 UI レイヤー -->
    <div id="uiContainer" class="absolute inset-0 pointer-events-none flex flex-col justify-between p-4 z-10">
        <div class="flex justify-between items-start w-full">
            <div class="flex flex-col gap-1">
                <div class="text-2xl font-bold font-mono tracking-wider drop-shadow-md">
                    スコア: <span id="scoreEl" class="text-cyan-400">0</span>
                </div>
                <div class="text-xl font-bold font-mono tracking-wider drop-shadow-md text-yellow-400">
                    コイン: <span id="gameCoinEl">0</span>
                </div>
                <div class="text-lg font-bold font-mono tracking-wider drop-shadow-md flex items-center mt-2">
                    シールド: <div id="shieldContainer" class="flex ml-2 gap-1"></div>
                </div>
                <div class="text-lg font-bold font-mono tracking-wider drop-shadow-md flex items-center">
                    ボム: <div id="bombContainer" class="flex ml-2 gap-1 text-red-500"></div>
                </div>
                <div class="text-xs text-gray-400 mt-1">※画面ダブルタップ/右クリックでボム発動</div>
            </div>
            <div class="flex flex-col items-end gap-2">
                <!-- BGMミュートボタン追加 -->
                <button id="soundToggleBtn"
                    class="text-2xl text-white hover:text-cyan-400 transition-colors pointer-events-auto drop-shadow-md"
                    title="BGMのON/OFF">
                    🔊
                </button>
                <div class="text-lg font-bold font-mono tracking-wider drop-shadow-md text-right">
                    レベル: <span id="levelEl" class="text-yellow-400">1</span>
                </div>
            </div>
        </div>

        <!-- ボスHPバー -->
        <div id="bossHpContainer" class="w-full max-w-2xl mx-auto mt-auto mb-10 hidden transition-opacity duration-500">
            <div
                class="text-center text-red-500 font-bold font-mono text-xl mb-1 drop-shadow-[0_0_5px_rgba(239,68,68,0.8)]">
                WARNING: BOSS APPROACHING</div>
            <div class="w-full h-4 border-2 border-red-500 rounded-full overflow-hidden bg-black bg-opacity-50">
                <div id="bossHpBar"
                    class="h-full bg-red-500 transition-all duration-100 w-full shadow-[0_0_10px_rgba(239,68,68,0.8)]">
                </div>
            </div>
        </div>
    </div>

    <!-- スタート / タイトル 画面 -->
    <div id="modalEl"
        class="absolute inset-0 bg-black bg-opacity-90 flex flex-col items-center justify-center z-20 transition-opacity duration-300">
        <div class="text-center max-w-lg w-full px-4">
            <h1 class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600 text-5xl md:text-6xl font-extrabold mb-2 tracking-widest drop-shadow-[0_0_15px_rgba(34,211,238,0.8)]"
                id="modalTitle">NEON STRIKE</h1>
            <p class="text-gray-300 text-lg mb-6 font-medium tracking-widest" id="modalDesc">指先かマウスで自機を操作せよ</p>

            <h2 class="text-3xl font-bold mb-4 hidden" id="finalScoreEl">スコア: <span id="finalScoreVal"
                    class="text-cyan-400">0</span></h2>

            <div class="bg-gray-900 bg-opacity-80 p-4 rounded-xl border border-gray-700 mb-6 shadow-lg">
                <div class="text-yellow-400 text-xl font-bold mb-4 font-mono">
                    所持コイン: <span id="totalCoinEl">0</span> C
                </div>

                <!-- 機体選択UI -->
                <div class="mb-2 text-sm text-gray-400">機体セレクト</div>
                <div
                    class="flex items-center justify-between bg-black bg-opacity-50 rounded-lg p-2 mb-4 pointer-events-auto">
                    <button id="prevShipBtn"
                        class="text-3xl font-bold px-4 py-2 hover:text-cyan-400 transition-colors">&lt;</button>
                    <div class="text-center flex-1">
                        <div id="shipNameDisplay" class="text-xl font-bold tracking-wider">TYPE-A</div>
                        <div id="shipDescDisplay" class="text-xs text-gray-400 mt-1">バランス型</div>
                    </div>
                    <button id="nextShipBtn"
                        class="text-3xl font-bold px-4 py-2 hover:text-cyan-400 transition-colors">&gt;</button>
                </div>

                <div class="flex justify-center gap-4 pointer-events-auto">
                    <button id="shopBtn"
                        class="bg-purple-600 hover:bg-purple-500 text-white font-bold py-3 px-6 rounded-lg shadow-[0_0_15px_rgba(147,51,234,0.6)] transition-all transform hover:scale-105 border border-purple-400">
                        ショップ
                    </button>
                    <button id="startBtn"
                        class="bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-3 px-8 rounded-lg shadow-[0_0_20px_rgba(8,145,178,0.8)] transition-all transform hover:scale-105 border-2 border-cyan-300 text-xl">
                        出撃する
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ショップ 画面 -->
    <div id="shopModalEl"
        class="absolute inset-0 bg-black bg-opacity-95 flex flex-col items-center justify-center z-30 hidden pointer-events-auto">
        <div
            class="bg-gray-900 p-6 md:p-8 rounded-2xl border-2 border-purple-500 max-w-md w-full shadow-[0_0_30px_rgba(147,51,234,0.3)]">
            <div class="flex justify-between items-center mb-6">
                <h2
                    class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-600">
                    UPGRADE SHOP</h2>
                <div class="text-yellow-400 font-bold font-mono text-xl"><span id="shopCoinEl">0</span> C</div>
            </div>

            <div class="space-y-4" id="shopItemsContainer">
                <!-- JSで動的に生成 -->
            </div>

            <button id="closeShopBtn"
                class="mt-8 w-full bg-gray-700 hover:bg-gray-600 text-white font-bold py-3 rounded-lg transition-colors border border-gray-500">
                戻る
            </button>
        </div>
    </div>

    <!-- ゲームを描画するキャンバス -->
    <canvas id="gameCanvas"></canvas>

    <script src="script.js"></script>
</body>

</html>
