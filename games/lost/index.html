<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ロスト＆ファウンド・シティ</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Zen+Old+Mincho:wght@400;700&display=swap"
        rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Zen Kaku Gothic New"', 'sans-serif'],
                        serif: ['"Zen Old Mincho"', 'serif'],
                    },
                    colors: {
                        night: {
                            900: '#0a0a1a',
                            800: '#151530',
                            700: '#20204a',
                        },
                        neon: {
                            blue: '#00f3ff',
                            purple: '#b026ff',
                            pink: '#ff007f',
                            gold: '#ffd700'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #0a0a1a;
            color: #e2e8f0;
            overflow: hidden;
            touch-action: none;
        }

        /* Glassmorphism Utilities */
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-panel {
            background: rgba(10, 10, 26, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        /* Animations */
        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes subtle-gleam {

            0%,
            85%,
            100% {
                opacity: 0;
                transform: scale(0.5);
            }

            90% {
                opacity: 0.5;
                transform: scale(1.2);
            }

            95% {
                opacity: 0.1;
                transform: scale(1.0);
            }
        }

        @keyframes rain-fall {
            0% {
                transform: translateY(-10vh);
                opacity: 0;
            }

            10% {
                opacity: 0.5;
            }

            90% {
                opacity: 0.5;
            }

            100% {
                transform: translateY(100vh);
                opacity: 0;
            }
        }

        @keyframes pulse-slow {

            0%,
            100% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }
        }

        .trash-node {
            position: absolute;
            cursor: pointer;
            transition: all 0.3s ease;
            transform: scale(0.8);
            z-index: 10;
        }

        .trash-node:hover {
            transform: scale(1.2) translateY(-5px) !important;
            filter: brightness(1.2) grayscale(0) drop-shadow(0 0 8px rgba(255, 255, 255, 0.4)) !important;
            opacity: 1 !important;
        }

        .trash-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            filter: blur(8px);
            animation: subtle-gleam 4s infinite;
            z-index: -1;
            pointer-events: none;
        }

        /* Rarity Colors */
        .rarity-common .trash-glow {
            background-color: rgba(255, 255, 255, 0.4);
        }

        .rarity-rare .trash-glow {
            background-color: rgba(0, 243, 255, 0.6);
        }

        .rarity-epic .trash-glow {
            background-color: rgba(176, 38, 255, 0.6);
        }

        .rarity-legendary .trash-glow {
            background-color: rgba(255, 215, 0, 0.8);
        }

        .rarity-text-common {
            color: #94a3b8;
        }

        .rarity-text-rare {
            color: #00f3ff;
            text-shadow: 0 0 8px rgba(0, 243, 255, 0.5);
        }

        .rarity-text-epic {
            color: #b026ff;
            text-shadow: 0 0 8px rgba(176, 38, 255, 0.5);
        }

        .rarity-text-legendary {
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }

        /* Layers & Scenery Base */
        .city-bg {
            position: absolute;
            inset: 0;
            z-index: -10;
            transition: background 2s ease;
        }

        .building {
            position: absolute;
            bottom: 20%;
            z-index: -5;
        }

        .window {
            position: absolute;
            width: 4px;
            height: 8px;
            box-shadow: 0 0 5px rgba(255, 215, 0, 0.5);
            transition: opacity 1s;
        }

        .ground {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 25%;
            z-index: -2;
            box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.8);
        }

        .rain-drop {
            position: absolute;
            width: 1px;
            height: 15px;
            animation: rain-fall linear infinite;
        }

        /* --- TIME OF DAY VARIATIONS --- */

        /* Night (19:00 - 5:59) */
        body[data-time="night"] .city-bg {
            background: linear-gradient(to bottom, #050510 0%, #151530 60%, #0a0a1a 100%);
        }

        body[data-time="night"] .building {
            background: linear-gradient(to bottom, #111122, #05050a);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        body[data-time="night"] .ground {
            background: linear-gradient(to bottom, #0a0a1a, #000);
            border-top: 2px solid rgba(0, 243, 255, 0.1);
        }

        body[data-time="night"] .window {
            opacity: 0.3;
            background-color: #ffd700;
        }

        body[data-time="night"] .rain-drop {
            background: linear-gradient(to bottom, transparent, rgba(255, 255, 255, 0.3));
        }

        body[data-time="night"] .trash-node {
            filter: brightness(0.2) grayscale(0.8) drop-shadow(0 2px 2px rgba(0, 0, 0, 0.8));
            opacity: 0.2;
        }

        body[data-time="night"] .trash-node.in-light {
            filter: brightness(0.5) grayscale(0.6) drop-shadow(0 0 3px rgba(255, 255, 255, 0.1));
            opacity: 0.5;
        }

        /* Morning (6:00 - 10:59) */
        body[data-time="morning"] .city-bg {
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 60%, #B0E2FF 100%);
        }

        body[data-time="morning"] .building {
            background: linear-gradient(to bottom, #636e72, #2d3436);
            border-top: 1px solid rgba(255, 255, 255, 0.3);
        }

        body[data-time="morning"] .ground {
            background: linear-gradient(to bottom, #2d3436, #1e272e);
            border-top: 2px solid rgba(135, 206, 250, 0.4);
        }

        body[data-time="morning"] .window {
            opacity: 0.05;
            background-color: #ffd700;
        }

        body[data-time="morning"] .rain-drop {
            background: linear-gradient(to bottom, transparent, rgba(100, 150, 255, 0.4));
        }

        body[data-time="morning"] .trash-node {
            filter: brightness(0.7) grayscale(0.2) drop-shadow(0 2px 2px rgba(0, 0, 0, 0.3));
            opacity: 0.7;
        }

        body[data-time="morning"] .trash-node.in-light {
            filter: brightness(1) grayscale(0) drop-shadow(0 0 5px rgba(255, 255, 255, 0.5));
            opacity: 1;
        }

        /* Day (11:00 - 15:59) */
        body[data-time="day"] .city-bg {
            background: linear-gradient(to bottom, #4A90E2 0%, #87CEFA 60%, #E0F6FF 100%);
        }

        body[data-time="day"] .building {
            background: linear-gradient(to bottom, #636e72, #2d3436);
            border-top: 1px solid rgba(255, 255, 255, 0.3);
        }

        body[data-time="day"] .ground {
            background: linear-gradient(to bottom, #2d3436, #1e272e);
            border-top: 2px solid rgba(135, 206, 250, 0.4);
        }

        body[data-time="day"] .window {
            opacity: 0.05;
            background-color: #ffd700;
        }

        body[data-time="day"] .rain-drop {
            background: linear-gradient(to bottom, transparent, rgba(100, 150, 255, 0.4));
        }

        body[data-time="day"] .trash-node {
            filter: brightness(0.8) grayscale(0.2) drop-shadow(0 2px 2px rgba(0, 0, 0, 0.3));
            opacity: 0.8;
        }

        body[data-time="day"] .trash-node.in-light {
            filter: brightness(1.1) grayscale(0) drop-shadow(0 0 5px rgba(255, 255, 255, 0.5));
            opacity: 1;
        }

        /* Evening (16:00 - 18:59) */
        body[data-time="evening"] .city-bg {
            background: linear-gradient(to bottom, #FF7E5F 0%, #FEB47B 60%, #FFD2A5 100%);
        }

        body[data-time="evening"] .building {
            background: linear-gradient(to bottom, #4b3621, #2d1e10);
            border-top: 1px solid rgba(253, 203, 110, 0.3);
        }

        body[data-time="evening"] .ground {
            background: linear-gradient(to bottom, #2d1e10, #110a05);
            border-top: 2px solid rgba(253, 203, 110, 0.4);
        }

        body[data-time="evening"] .window {
            opacity: 0.5;
            background-color: #ffeaa7;
        }

        body[data-time="evening"] .rain-drop {
            background: linear-gradient(to bottom, transparent, rgba(255, 200, 100, 0.4));
        }

        body[data-time="evening"] .trash-node {
            filter: brightness(0.5) grayscale(0.4) drop-shadow(0 2px 2px rgba(0, 0, 0, 0.5));
            opacity: 0.5;
        }

        body[data-time="evening"] .trash-node.in-light {
            filter: brightness(0.9) grayscale(0.1) drop-shadow(0 0 5px rgba(255, 200, 100, 0.3));
            opacity: 0.9;
        }

        /* Effects Layers */
        #flashlight-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 20;
            opacity: 0;
            transition: opacity 1s ease;
        }

        #fog-layer {
            position: fixed;
            inset: 0;
            background: linear-gradient(to top, rgba(150, 160, 180, 0.4), transparent);
            backdrop-filter: blur(3px);
            pointer-events: none;
            opacity: 0;
            z-index: 15;
            transition: opacity 3s ease;
        }

        /* Modals & UI */
        .ui-layer {
            z-index: 30;
        }

        .modal-enter {
            opacity: 0;
            transform: scale(0.9) translateY(20px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-enter-active {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
    </style>
</head>

<body class="font-sans antialiased selection:bg-neon-blue selection:text-night-900" data-time="night">

    <!-- Title Screen -->
    <div id="title-screen"
        class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black/60 backdrop-blur-sm transition-opacity duration-1000">
        <h1
            class="font-serif text-4xl md:text-6xl tracking-[0.2em] text-white drop-shadow-[0_0_15px_rgba(255,255,255,0.8)] mb-4 text-center z-10 animate-[pulse-slow_4s_ease-in-out_infinite]">
            Lost & Found<br><span
                class="text-xl md:text-3xl text-neon-blue/90 tracking-widest mt-2 block drop-shadow-md">ロスト＆ファウンド・シティ</span>
        </h1>
        <p class="text-gray-200 font-serif text-sm tracking-widest mb-12 z-10 drop-shadow-md">現実の時間帯に合わせて、景色が変化します</p>

        <button onclick="startGame()"
            class="z-10 glass-panel bg-black/50 px-10 py-4 rounded-full text-white font-serif tracking-widest hover:bg-white/20 transition-all hover:scale-105 border border-white/30 hover:border-neon-blue shadow-[0_0_20px_rgba(0,0,0,0.5)]">
            街へ出る
        </button>
    </div>

    <!-- Scenery Layers -->
    <div class="city-bg" id="scenery"></div>
    <div class="ground"></div>
    <div id="rain-container" class="absolute inset-0 pointer-events-none z-[-1]"></div>

    <!-- Fog & Flashlight Effects -->
    <div id="fog-layer"></div>
    <div id="flashlight-layer"></div>

    <!-- Main UI Layer -->
    <div class="relative ui-layer flex flex-col h-screen p-4 md:p-8 pointer-events-none">

        <!-- Header / Status -->
        <header class="flex justify-between items-start pointer-events-auto">
            <div class="glass px-6 py-4 rounded-2xl bg-black/40 shadow-lg">
                <h1 class="font-serif text-2xl tracking-widest text-white drop-shadow-md">Lost & Found</h1>
                <p class="text-xs text-neon-blue mt-1 tracking-wider opacity-90 font-bold" id="weather-text">街角清掃記録</p>

                <div class="mt-4">
                    <div class="flex justify-between text-xs mb-1">
                        <span class="text-gray-300 drop-shadow-md">街の浄化度</span>
                        <span id="score-text" class="text-white font-mono drop-shadow-md">0 / 100</span>
                    </div>
                    <div class="w-full h-1.5 bg-black/60 rounded-full overflow-hidden border border-white/10">
                        <div id="score-bar"
                            class="h-full bg-gradient-to-r from-neon-blue to-neon-purple w-0 transition-all duration-700 ease-out">
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-3">
                <button onclick="toggleCollection()"
                    class="glass bg-black/40 p-4 rounded-full hover:bg-white/20 transition-colors group relative border border-white/20 shadow-lg">
                    <i data-lucide="book-open"
                        class="text-white w-6 h-6 group-hover:text-neon-gold transition-colors"></i>
                    <span
                        class="absolute right-16 top-1/2 -translate-y-1/2 text-xs opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap bg-black/80 px-3 py-1 rounded text-white border border-white/10">図鑑</span>
                </button>

                <!-- 記憶のボタン -->
                <button id="memory-btn" onclick="toggleMemory()"
                    class="hidden glass bg-black/40 p-4 rounded-full bg-neon-purple/20 hover:bg-neon-purple/40 transition-colors group relative border border-neon-purple/50 animate-pulse shadow-lg">
                    <i data-lucide="sparkles" class="text-neon-purple w-6 h-6"></i>
                    <span
                        class="absolute right-16 top-1/2 -translate-y-1/2 text-xs opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap bg-black/80 px-3 py-1 rounded text-neon-purple border border-neon-purple/30">記憶の断片</span>
                </button>
            </div>
        </header>

        <!-- Main Play Area -->
        <main id="game-area"
            class="flex-grow relative w-full h-full mt-8 rounded-3xl overflow-hidden pointer-events-auto"></main>

        <!-- Footer / Message -->
        <footer class="mt-4 text-center pointer-events-none">
            <p id="system-message"
                class="text-sm text-gray-200 font-serif transition-opacity duration-300 bg-black/60 inline-block px-5 py-2 rounded-full backdrop-blur-md shadow-lg border border-white/10">
                周囲を探って、落とし物を見つけてください。
            </p>
        </footer>
    </div>

    <!-- Modals -->

    <!-- Item Reveal Modal -->
    <div id="reveal-modal"
        class="fixed inset-0 z-[60] flex items-center justify-center hidden bg-black/60 backdrop-blur-sm transition-opacity duration-300 opacity-0">
        <div id="reveal-content"
            class="glass-panel p-8 rounded-3xl max-w-sm w-full mx-4 modal-enter text-center relative overflow-hidden shadow-[0_0_50px_rgba(0,0,0,0.8)]">
            <div id="reveal-glow"
                class="absolute inset-0 opacity-20 bg-gradient-to-b from-transparent to-white/5 pointer-events-none">
            </div>

            <p id="reveal-title-text" class="text-xs text-gray-400 tracking-widest mb-6 border-b border-white/10 pb-2">
                アイテムを発見しました</p>
            <div class="text-6xl mb-6 filter drop-shadow-[0_0_15px_rgba(255,255,255,0.3)] animate-pulse"
                id="reveal-icon">🥫</div>
            <h2 id="reveal-name" class="font-serif text-2xl font-bold mb-2 text-white">潰れた空き缶</h2>
            <p id="reveal-rarity" class="text-xs font-bold tracking-widest uppercase mb-6 rarity-text-common">Common</p>

            <div class="bg-black/40 p-4 rounded-xl mb-8 border border-white/10 shadow-inner">
                <p id="reveal-desc" class="text-sm leading-relaxed text-gray-300 font-serif">中身は20年前の限定ソーダだったようだ。</p>
            </div>

            <button id="reveal-btn" onclick="closeReveal()"
                class="w-full py-3 rounded-xl bg-white/10 hover:bg-white/20 text-white text-sm tracking-wider transition-all border border-white/20 hover:border-white/40 shadow-md">
                鞄にしまう
            </button>
        </div>
    </div>

    <!-- Collection Book Modal -->
    <div id="collection-modal"
        class="fixed inset-0 z-[50] flex items-center justify-center hidden bg-black/80 backdrop-blur-md transition-opacity duration-300 opacity-0">
        <div class="glass-panel w-full max-w-4xl h-[80vh] mx-4 rounded-3xl flex flex-col modal-enter"
            id="collection-content">
            <div class="flex justify-between items-center p-6 border-b border-white/10">
                <div>
                    <h2 class="font-serif text-2xl text-white">遺失物図鑑</h2>
                    <p class="text-xs text-neon-blue mt-1 font-mono">Collected: <span id="collection-count">0</span> /
                        15</p>
                </div>
                <button onclick="toggleCollection()"
                    class="p-2 rounded-full hover:bg-white/10 transition-colors border border-transparent hover:border-white/20">
                    <i data-lucide="x" class="text-gray-400 w-6 h-6"></i>
                </button>
            </div>
            <div class="flex-grow overflow-y-auto p-6 custom-scrollbar" id="collection-grid">
                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4" id="grid-container"></div>
            </div>
        </div>
    </div>

    <!-- Story List Modal -->
    <div id="story-list-modal"
        class="fixed inset-0 z-[55] flex items-center justify-center hidden bg-black/80 backdrop-blur-md transition-opacity duration-300 opacity-0">
        <div class="glass-panel w-full max-w-2xl h-[70vh] mx-4 rounded-3xl flex flex-col modal-enter"
            id="story-list-content">
            <div class="flex justify-between items-center p-6 border-b border-white/10">
                <div>
                    <h2 class="font-serif text-2xl text-white">記憶の目録</h2>
                    <p class="text-xs text-neon-purple mt-1 font-mono">Stories unlocked: <span id="story-count">0</span> /
                        4</p>
                </div>
                <button onclick="toggleStoryList()"
                    class="p-2 rounded-full hover:bg-white/10 transition-colors border border-transparent hover:border-white/20">
                    <i data-lucide="x" class="text-gray-400 w-6 h-6"></i>
                </button>
            </div>
            <div class="flex-grow overflow-y-auto p-6 custom-scrollbar" id="story-list-container">
                <!-- Stories added here -->
            </div>
        </div>
    </div>

    <!-- Memory Modal (Story Detail) -->
    <div id="memory-modal"
        class="fixed inset-0 z-[70] flex items-center justify-center hidden bg-black/90 backdrop-blur-lg transition-opacity duration-500 opacity-0">
        <div id="memory-content"
            class="max-w-2xl w-full mx-4 modal-enter text-center p-8 border border-white/10 rounded-lg bg-gradient-to-b from-night-900 to-black relative">
            <div class="absolute inset-0 opacity-10 pointer-events-none"></div>
            <p class="text-neon-purple text-xs tracking-[0.3em] mb-4">解放された記憶</p>
            <h2 id="memory-title"

            <p id="memory-text"
                class="text-gray-300 font-serif leading-loose text-sm md:text-base text-left px-4 md:px-12 whitespace-pre-line">
                度の強い眼鏡越しに、彼はずっと同じ景色を見ていた。
            </p>
            <button class="mt-12 text-gray-500 hover:text-white transition-colors text-sm tracking-widest border-b border-transparent hover:border-white pb-1">
                現実へ戻る
            </button>
        </div>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        const ITEMS = [
            { id: 1, name: "潰れた空き缶", desc: "パッケージのロゴは擦り切れている。中身は20年前の限定ソーダだったという噂がある。", rarity: "common", icon: "🥫" },
            { id: 2, name: "片方だけの靴下", desc: "絶妙にダサい柄。もう片方は洗濯機の裏から異世界へ転移したという説が有力。", rarity: "common", icon: "🧦" },
            { id: 3, name: "雨に濡れた新聞", desc: "日付は明日のものになっている。インクが滲んでいて肝心の記事は読めない。", rarity: "common", icon: "📰" },
            { id: 4, name: "折れたビニール傘", desc: "強風と戦った勇者のなれの果て。骨組みが現代アートのような形状に歪んでいる。", rarity: "common", icon: "☂️" },
            { id: 5, name: "誰かの眼鏡", desc: "度が強すぎる。これをかけると、見えないはずのものまで見えてしまいそうだ。", rarity: "common", icon: "👓" },
            { id: 6, name: "謎の歯車", desc: "時計の部品にしては大きく、車の部品にしては繊細。何かの巨大な絡繰りの一部か？", rarity: "rare", icon: "⚙️" },
            { id: 7, name: "古びた鍵", desc: "真鍮製で冷たい。この街のどこかにある、開かずの扉を開けることができるかもしれない。", rarity: "rare", icon: "🗝️" },
            { id: 8, name: "ゲームカセット", desc: "ラベルが剥がされた謎のロムカセット。差し込むと呪いのゲームが始まる定番のやつ。", rarity: "rare", icon: "📼" },
            { id: 9, name: "片目だけのテディベア", desc: "雨の路地裏に座っていた。残された片目で、この街の変遷をずっと見つめていた。", rarity: "rare", icon: "🧸" },
            { id: 10, name: "破られたラブレター", desc: "宛名部分は意図的に燃やされている。微かに残る香水の匂いが、ひどく切ない。", rarity: "epic", icon: "💌" },
            { id: 11, name: "録音機", desc: "再生ボタンを押すと、街の喧騒に混じって「...見つけた」という声だけがループする。", rarity: "epic", icon: "🎙️" },
            { id: 12, name: "黒塗りのフロッピー", desc: "現代のPCでは読み込めない。都市伝説とされるハッカー集団の設計図が入っているらしい。", rarity: "epic", icon: "💾" },
            { id: 13, name: "琥珀色の小瓶", desc: "中で液体が微かに発光している。飲むと一時的に時間を数秒戻せる...気がするだけ。", rarity: "epic", icon: "🧪" },
            { id: 14, name: "星の欠片", desc: "仄かに青白く光る鉱石。耳を近づけると、遠い宇宙のノイズのような音が聞こえる。", rarity: "legendary", icon: "💎" },
            { id: 15, name: "記憶のフィルム", desc: "光に透かすと、自分が生まれる前の、知らない誰かの楽しそうな日常が映っている。", rarity: "legendary", icon: "🎞️" },
            { id: 16, name: "止まった懐中時計", desc: "11時55分で止まっている。裏蓋には「永遠に君と」と刻まれている。", rarity: "rare", icon: "⌚" },
            { id: 17, name: "不思議な地図", desc: "自分の居場所が赤い点で表示される。しかし、地図に描かれている地形はこの街のどこにもない。", rarity: "rare", icon: "🗺️" },
            { id: 18, name: "銀のスプーン", desc: "口に含むと、最後に使った人が食べた料理の味が微かにする。今日はシチューだったようだ。", rarity: "common", icon: "🥄" },
            { id: 19, name: "割れたコンパス", desc: "針は北ではなく、常に自分の一番大切な人がいる方向を指し続けている。", rarity: "epic", icon: "🧭" },

            { id: 21, name: "空の財布", desc: "中にはレシートが一枚だけ。「夢の代金：支払済」と書かれている。", rarity: "common", icon: "👛" },
            { id: 22, name: "光るサイコロ", desc: "振るたびに違う色に光る。出た目によって、その日の運勢が物理的に書き換わるらしい。", rarity: "rare", icon: "🎲" },
            { id: 23, name: "色褪せたパスポート", desc: "発行国欄が空白。スタンプはどれも幾何学的な模様で、文字ではない。", rarity: "epic", icon: "📕" },
            { id: 24, name: "金のトランプ", desc: "ジョーカーにだけ、自分の顔が描かれている。不敵な笑みを浮かべている。", rarity: "legendary", icon: "🃏" },
            { id: 25, name: "古いラジオ", desc: "電池が入っていないのに、時々砂嵐に混じって未来のニュースが聞こえてくる。", rarity: "rare", icon: "📻" },
            { id: 26, name: "ガラスの眼球", desc: "机に置くと、部屋の隅をじっと見つめ始める。誰の目だったのだろうか。", rarity: "epic", icon: "👁️" },
            { id: 27, name: "錆びたメダル", desc: "「最優秀喪失者」と刻印されている。名誉なのか、皮肉なのか。", rarity: "common", icon: "🏅" },
            { id: 28, name: "燃え残った日記", desc: "最後のページには「もうすぐ夜が明ける」とだけ書かれている。", rarity: "rare", icon: "📔" },
            { id: 29, name: "時をかける切符", desc: "行き先は「思い出の場所」。改札を通る勇気は、まだない。", rarity: "legendary", icon: "🎫" },
            { id: 30, name: "謎の種", desc: "植えると、翌日には持ち主の欲しかった花の姿で、鉄のように硬く咲くらしい。", rarity: "rare", icon: "🌱" }
        ];

        const STORIES = [
            {
                id: "story1",
                title: "見えない宛先",
                requiredIds: [5, 10, 15],
                text: "度の強い眼鏡越しに、彼はずっと同じ景色を見ていた。\n手渡せなかった手紙は雨に濡れ、フィルムに焼き付けたあの日の笑顔だけが、今も鮮明に街の片隅を漂っている。\n\n失われたものは、いつか誰かが見つけてくれるのを待っているのかもしれない。"
            },
            {
                id: "story2",
                title: "時間の囚人",
                requiredIds: [16, 11, 29],
                text: "11時55分。録音機から流れる声と、止まった時計の針。\n彼は何度も同じ切符を握りしめ、改札の前で立ち止まる。\n\n「次は、うまくいくから」\nその声は、自分自身に向けられたものだったのかもしれない。"
            },
            {
                id: "story3",
                title: "異界からの漂着物",
                requiredIds: [12, 17, 23],
                text: "この街のどこにもないはずの地形を描いた地図。存在しない国のパスポート。\n私たちは、この街そのものが「何か」の巨大な忘れ物であることに気づいていない。\n\n黒いフロッピーに記録されたデータが実行された時、街の裏側が姿を現すだろう。"
            },
            {
                id: "story4",
                title: "幸福の代償",
                requiredIds: [20, 21, 24],
                text: "幸福の対価は、常に平等に支払われなければならない。\n青い羽根を手に入れた者が、空の財布に残されたレシートに気づくことは稀だ。\n\n金のジョーカーが笑っているのは、次に誰が「支払い」をするかを知っているからだ。"
            }
        ];

        let state = {
            isRunning: false,
            score: 0,
            maxScore: 100,
            foundItems: [],
            activeTrash: 0,
            memoryUnlocked: false,
            gameIntervals: [],
            unlockedStories: []
        };

        const gameArea = document.getElementById('game-area');
        const scoreBar = document.getElementById('score-bar');
        const scoreText = document.getElementById('score-text');
        const sysMsg = document.getElementById('system-message');
        const flashlight = document.getElementById('flashlight-layer');
        const weatherText = document.getElementById('weather-text');

        let timeOfDay = 'night';
        let currentMouseX = window.innerWidth / 2;
        let currentMouseY = window.innerHeight / 2;

        // --- 時間帯の判定 ---
        function updateTimeOfDay() {
            const hour = new Date().getHours();
            if (hour >= 6 && hour < 11) timeOfDay = 'morning';
            else if (hour >= 11 && hour < 16) timeOfDay = 'day';
            else if (hour >= 16 && hour < 19) timeOfDay = 'evening';
            else timeOfDay = 'night';

            document.body.dataset.time = timeOfDay;
        }

        // --- ライトの描画（時間帯連動） ---
        function renderFlashlight(x, y) {
            let darkAlpha = 1;
            let midAlpha = 0.5;

            if (timeOfDay === 'morning' || timeOfDay === 'day') {
                darkAlpha = 0.15; // 昼は全体的にかなり明るい
                midAlpha = 0.05;
            } else if (timeOfDay === 'evening') {
                darkAlpha = 0.6; // 夕方は少し薄暗い
                midAlpha = 0.2;
            } else {
                darkAlpha = 1; // 夜は真っ暗
                midAlpha = 0.5;
            }

            const darkAlphaOuter = darkAlpha === 1 ? 1 : darkAlpha + 0.1;
            flashlight.style.background = `radial-gradient(circle 280px at ${x}px ${y}px, transparent 0%, transparent 40%, rgba(0,0,0,${midAlpha}) 70%, rgba(0,0,0,${darkAlpha}) 90%, rgba(0,0,0,${darkAlphaOuter}) 100%)`;
        }

        function updateTrashVisibility(x, y) {
            const trashNodes = document.querySelectorAll('.trash-node');
            const visibilityRadius = 180;

            trashNodes.forEach(node => {
                const rect = node.getBoundingClientRect();
                const nodeX = rect.left + rect.width / 2;
                const nodeY = rect.top + rect.height / 2;
                const dist = Math.sqrt(Math.pow(x - nodeX, 2) + Math.pow(y - nodeY, 2));

                if (dist < visibilityRadius) node.classList.add('in-light');
                else node.classList.remove('in-light');
            });
        }


        // --- Save / Load ---
        function saveGame() {
            const data = {
                score: state.score,
                foundItems: state.foundItems,
                unlockedStories: state.unlockedStories
            };
            localStorage.setItem('lost-found-save', JSON.stringify(data));
        }

        function loadGame() {
            const saved = localStorage.getItem('lost-found-save');
            if (saved) {
                const data = JSON.parse(saved);
                state.score = data.score || 0;
                state.foundItems = data.foundItems || [];
                state.unlockedStories = data.unlockedStories || [];
                updateUI();
                if (state.unlockedStories.length > 0) {
                    state.memoryUnlocked = true;
                    document.getElementById('memory-btn').classList.remove('hidden');
                }
            }
        }

        function startGame() {
            const titleScreen = document.getElementById('title-screen');
            titleScreen.style.opacity = '0';
            setTimeout(() => { titleScreen.remove(); }, 1000);

            state.isRunning = true;
            flashlight.style.opacity = '1';

            state.gameIntervals.push(setInterval(() => { if (Math.random() > 0.5) spawnTrash(); }, 3000));
            state.gameIntervals.push(setInterval(() => { if (Math.random() > 0.6) spawnCat(); }, 15000));

            for (let i = 0; i < 2; i++) setTimeout(spawnTrash, i * 1000);
            updateWeather();
        }

        const handlePointerMove = (x, y) => {
            if (!state.isRunning) return;
            currentMouseX = x; currentMouseY = y;
            renderFlashlight(x, y);
            updateTrashVisibility(x, y);
        };

        document.addEventListener('mousemove', (e) => handlePointerMove(e.clientX, e.clientY));
        document.addEventListener('touchmove', (e) => handlePointerMove(e.touches[0].clientX, e.touches[0].clientY));
        document.addEventListener('touchstart', (e) => handlePointerMove(e.touches[0].clientX, e.touches[0].clientY));

        // --- 背景の生成と天候 ---
        function generateScenery() {
            const scenery = document.getElementById('scenery');
            const numBuildings = 15;
            for (let i = 0; i < numBuildings; i++) {
                const b = document.createElement('div');
                b.className = 'building';
                const width = Math.floor(Math.random() * 60) + 40;
                const height = Math.floor(Math.random() * 50) + 20;
                b.style.width = `${width}px`;
                b.style.height = `${height}%`;
                b.style.left = `${Math.random() * 100}%`;
                b.style.zIndex = Math.floor(Math.random() * 5) - 10;

                for (let w = 0; w < Math.floor(Math.random() * 10); w++) {
                    const win = document.createElement('div');
                    win.className = 'window';
                    win.style.left = `${Math.random() * 80 + 10}%`;
                    win.style.top = `${Math.random() * 80 + 10}%`;
                    if (Math.random() > 0.3) b.appendChild(win);
                }
                scenery.appendChild(b);
            }
        }

        function setRain(count) {
            const container = document.getElementById('rain-container');
            container.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const drop = document.createElement('div');
                drop.className = 'rain-drop';
                drop.style.left = `${Math.random() * 100}%`;
                drop.style.animationDuration = `${Math.random() * 0.8 + 0.4}s`;
                drop.style.animationDelay = `${Math.random() * 2}s`;
                container.appendChild(drop);
            }
        }

        function updateWeather() {
            const fog = document.getElementById('fog-layer');
            const bg = document.getElementById('scenery');
            const timePrefix = { morning: "朝", day: "昼", evening: "夕暮れ", night: "深夜" }[timeOfDay];

            if (state.score < 30) {
                setRain(80);
                fog.style.opacity = '0';
                weatherText.innerText = `${timePrefix}の街角清掃記録 (土砂降り)`;
                bg.style.background = ''; // CSSの[data-time]指定に戻す
                document.querySelectorAll('.star-effect').forEach(el => el.remove());
            } else if (state.score < 60) {
                setRain(30);
                fog.style.opacity = '0';
                weatherText.innerText = `${timePrefix}の街角清掃記録 (小雨)`;
                sysMsg.innerText = '雨が弱まってきた。少し探しやすくなったかもしれない。';
            } else if (state.score < 90) {
                setRain(5);
                fog.style.opacity = '1';
                weatherText.innerText = `${timePrefix}の街角清掃記録 (深い霧)`;
                sysMsg.innerText = '濃い霧が立ち込めている。見落とさないように。';
            } else {
                setRain(0);
                fog.style.opacity = '0';
                weatherText.innerText = `${timePrefix}の街角清掃記録 (晴れ)`;
                sysMsg.innerText = '街に静寂が戻った。空が澄んで見える。';

                // 夜の晴れ限定で星空を表示
                if (timeOfDay === 'night') {
                    bg.style.background = 'linear-gradient(to bottom, #0f1020 0%, #151530 60%, #0a0a1a 100%)';
                    if (document.querySelectorAll('.star-effect').length < 20) {
                        for (let i = 0; i < 20; i++) {
                            let star = document.createElement('div');
                            star.className = 'absolute bg-white rounded-full opacity-50 star-effect';
                            star.style.width = star.style.height = `${Math.random() * 2 + 1}px`;
                            star.style.left = `${Math.random() * 100}%`;
                            star.style.top = `${Math.random() * 40}%`;
                            bg.appendChild(star);
                        }
                    }
                } else {
                    bg.style.background = '';
                }
            }
        }

        // --- Core Game Logic ---
        function getRandomItem(forceRare = false) {
            const rand = Math.random();
            let rarityPool = forceRare ? (rand > 0.8 ? "legendary" : (rand > 0.4 ? "epic" : "rare")) :
                (rand > 0.95 ? "legendary" : (rand > 0.85 ? "epic" : (rand > 0.60 ? "rare" : "common")));
            const pool = ITEMS.filter(item => item.rarity === rarityPool);
            return pool[Math.floor(Math.random() * pool.length)];
        }

        function spawnTrash(forceX = null, forceY = null, forceRare = false) {
            if (state.activeTrash >= 4 && !forceX) return;

            const item = getRandomItem(forceRare);
            const trashEl = document.createElement('div');
            trashEl.className = `trash-node rarity-${item.rarity}`;

            trashEl.style.left = forceX !== null ? forceX + '%' : (Math.random() * 90 + 5) + '%';
            trashEl.style.bottom = forceY !== null ? forceY + '%' : (Math.random() * 35 + 2) + '%';

            trashEl.innerHTML = `
                <div class="trash-glow" style="animation-delay: ${Math.random() * 4}s"></div>
                <div class="text-xl md:text-2xl relative z-10 transition-transform">${item.icon}</div>
            `;
            trashEl.onclick = () => collectTrash(trashEl, item);
            gameArea.appendChild(trashEl);
            state.activeTrash++;

            updateTrashVisibility(currentMouseX, currentMouseY);
        }

        function spawnCat() {
            const cat = document.createElement('div');
            cat.className = 'absolute text-3xl filter brightness-0 drop-shadow-md z-10 cursor-pointer transition-transform';
            cat.innerText = '🐈‍⬛';

            const startY = Math.random() * 15 + 2;
            cat.style.bottom = `${startY}%`;

            const isRightToLeft = Math.random() > 0.5;
            let currentX = isRightToLeft ? 110 : -10;
            cat.style.transform = isRightToLeft ? 'scaleX(-1)' : 'scaleX(1)';

            gameArea.appendChild(cat);

            let speed = 0.05, isSurprised = false;
            const moveInterval = setInterval(() => {
                if (!state.isRunning) return;
                currentX += isRightToLeft ? -speed : speed;
                cat.style.left = `${currentX}%`;
                if (currentX < -20 || currentX > 120) { clearInterval(moveInterval); cat.remove(); }
            }, 16);

            cat.onclick = () => {
                if (isSurprised) return;
                isSurprised = true;
                speed = 0.8;
                cat.style.transform = (isRightToLeft ? 'scaleX(-1)' : 'scaleX(1)') + ' scaleY(0.8)';
                if (Math.random() < 0.3) {
                    spawnTrash(currentX, startY, true);
                    sysMsg.innerText = '猫が何かを落としていった...';
                }
            };
        }

        function collectTrash(element, item) {
            element.style.transform = 'scale(0)';
            element.style.opacity = '0';
            setTimeout(() => { element.remove(); }, 300);
            state.activeTrash--;

            if (!state.foundItems.includes(item.id)) state.foundItems.push(item.id);
            state.score = Math.min(state.maxScore, state.score + 5);

            updateUI();
            checkMemoryUnlock();
            saveGame();
            showReveal(item);
        }

        function updateUI() {
            scoreBar.style.width = `${(state.score / state.maxScore) * 100}%`;
            scoreText.innerText = `${state.score} / ${state.maxScore}`;
            if ([30, 60, 90].includes(state.score)) updateWeather();
        }

        function checkMemoryUnlock() {
            STORIES.forEach(story => {
                if (!state.unlockedStories.includes(story.id)) {
                    if (story.requiredIds.every(id => state.foundItems.includes(id))) {
                        state.unlockedStories.push(story.id);
                        state.memoryUnlocked = true;
                        document.getElementById('memory-btn').classList.remove('hidden');
                        document.getElementById('memory-btn').classList.add('animate-pulse');
                        sysMsg.innerText = `物語「${story.title}」が解放された...`;
                        saveGame();
                    }
                }
            });
        }

        // --- Modals Controllers ---
        const revealModal = document.getElementById('reveal-modal');
        const revealContent = document.getElementById('reveal-content');

        function showReveal(item, isFromCollection = false) {
            document.getElementById('reveal-icon').innerText = item.icon;
            document.getElementById('reveal-name').innerText = item.name;
            document.getElementById('reveal-desc').innerText = item.desc;

            const rarityEl = document.getElementById('reveal-rarity');
            rarityEl.innerText = item.rarity;
            rarityEl.className = `text-xs font-bold tracking-widest uppercase mb-6 rarity-text-${item.rarity}`;

            document.getElementById('reveal-title-text').innerText = isFromCollection ? "遺失物詳細" : "アイテムを発見しました";
            document.getElementById('reveal-btn').innerText = isFromCollection ? "閉じる" : "鞄にしまう";

            const glowEl = document.getElementById('reveal-glow');
            glowEl.className = 'absolute inset-0 opacity-20 bg-gradient-to-b from-transparent pointer-events-none ' +
                (item.rarity === 'common' ? 'to-white/10' : item.rarity === 'rare' ? 'to-neon-blue/20' :
                    item.rarity === 'epic' ? 'to-neon-purple/20' : 'to-neon-gold/20');

            revealModal.classList.remove('hidden');
            setTimeout(() => {
                revealModal.classList.remove('opacity-0');
                revealContent.classList.add('modal-enter-active');
            }, 10);
        }

        function closeReveal() {
            revealModal.classList.add('opacity-0');
            revealContent.classList.remove('modal-enter-active');
            setTimeout(() => revealModal.classList.add('hidden'), 300);
        }

        const colModal = document.getElementById('collection-modal');
        const colContent = document.getElementById('collection-content');

        function toggleCollection() {
            if (colModal.classList.contains('hidden')) {
                renderCollection();
                colModal.classList.remove('hidden');
                setTimeout(() => { colModal.classList.remove('opacity-0'); colContent.classList.add('modal-enter-active'); }, 10);
            } else {
                colModal.classList.add('opacity-0');
                colContent.classList.remove('modal-enter-active');
                setTimeout(() => colModal.classList.add('hidden'), 300);
            }
        }

        function renderCollection() {
            const grid = document.getElementById('grid-container');
            document.getElementById('collection-count').innerText = state.foundItems.length;
            grid.innerHTML = '';

            ITEMS.forEach(item => {
                const isFound = state.foundItems.includes(item.id);
                const card = document.createElement('div');

                if (isFound) {
                    card.className = `glass p-4 rounded-2xl flex flex-col items-center text-center relative overflow-hidden group border border-white/20 hover:border-white/50 transition-colors cursor-pointer bg-black/40`;
                    card.onclick = () => showReveal(item, true);
                    card.innerHTML = `
                        <div class="absolute inset-0 opacity-0 group-hover:opacity-10 bg-gradient-to-t from-white to-transparent transition-opacity"></div>
                        <div class="text-4xl mb-3 filter drop-shadow-md">${item.icon}</div>
                        <h3 class="font-serif text-sm font-bold text-white mb-1">${item.name}</h3>
                        <span class="text-[10px] tracking-wider uppercase rarity-text-${item.rarity}">${item.rarity}</span>
                        <div class="absolute inset-0 bg-black/90 backdrop-blur-sm p-4 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                            <p class="text-xs font-bold tracking-widest text-white font-serif">詳細を見る</p>
                        </div>
                    `;
                } else {
                    card.className = `glass p-4 rounded-2xl flex flex-col items-center justify-center text-center opacity-40 border border-white/5 bg-black/20`;
                    card.innerHTML = `
                        <div class="text-4xl mb-3 filter grayscale blur-[2px]">❓</div>
                        <h3 class="font-serif text-sm text-gray-500 mb-1">未発見</h3>
                        <span class="text-[10px] tracking-wider uppercase text-gray-600">Unknown</span>
                    `;
                }
                grid.appendChild(card);
            });
        }

        const memModal = document.getElementById('memory-modal');
        const memContent = document.getElementById('memory-content');
        const storyListModal = document.getElementById('story-list-modal');
        const storyListContent = document.getElementById('story-list-content');

        function toggleStoryList() {
            if (storyListModal.classList.contains('hidden')) {
                renderStoryList();
                storyListModal.classList.remove('hidden');
                setTimeout(() => { storyListModal.classList.remove('opacity-0'); storyListContent.classList.add('modal-enter-active'); }, 10);
            } else {
                storyListModal.classList.add('opacity-0');
                storyListContent.classList.remove('modal-enter-active');
                setTimeout(() => storyListModal.classList.add('hidden'), 300);
            }
        }

        function renderStoryList() {
            const container = document.getElementById('story-list-container');
            document.getElementById('story-count').innerText = state.unlockedStories.length;
            container.innerHTML = '';

            STORIES.forEach(story => {
                const isUnlocked = state.unlockedStories.includes(story.id);
                const el = document.createElement('div');
                el.className = `glass p-6 rounded-2xl mb-4 transition-all ${isUnlocked ? 'cursor-pointer hover:bg-white/10 border-white/20 border' : 'opacity-40 grayscale border-white/5 border'}`;
                
                if (isUnlocked) {
                    el.onclick = () => {
                        toggleStoryList();
                        setTimeout(() => openMemory(story), 350);
                    };
                    el.innerHTML = `
                        <div class="flex justify-between items-center">
                            <div>
                                <h3 class="font-serif text-lg text-white">${story.title}</h3>
                                <p class="text-xs text-neon-purple mt-1">記憶を読み解く</p>
                            </div>
                            <i data-lucide="chevron-right" class="text-neon-purple"></i>
                        </div>
                    `;
                } else {
                    const requiredItems = story.requiredIds.map(id => {
                        const it = ITEMS.find(i => i.id === id);
                        return state.foundItems.includes(id) ? it.icon : '❓';
                    }).join(' ');
                    el.innerHTML = `
                        <div class="flex justify-between items-center">
                            <div>
                                <h3 class="font-serif text-lg text-gray-500">？？？？</h3>
                                <p class="text-xs text-gray-600 mt-2">必要アイテム: ${requiredItems}</p>
                            </div>
                            <i data-lucide="lock" class="text-gray-600 w-5 h-5"></i>
                        </div>
                    `;
                }
                container.appendChild(el);
            });
            lucide.createIcons();
        }

        function toggleMemory() {
            toggleStoryList();
        }

        function openMemory(story) {
            document.getElementById('memory-title').innerText = story.title;
            document.getElementById('memory-text').innerText = story.text;
            memModal.classList.remove('hidden');
            setTimeout(() => { memModal.classList.remove('opacity-0'); memContent.classList.add('modal-enter-active'); }, 10);
            document.getElementById('memory-btn').classList.remove('animate-pulse');
        }

        function closeMemory() {
            memModal.classList.add('opacity-0');
            memContent.classList.remove('modal-enter-active');
            setTimeout(() => {
                memModal.classList.add('hidden');
                toggleStoryList();
            }, 500);
        }

        // 再定義したcloseボタン用にHTMLを一部書き換え、またはJSで制御
        document.querySelector('#memory-modal button').onclick = closeMemory;

        // --- Init ---
        updateTimeOfDay(); 
        generateScenery();
        setRain(0);
        loadGame();
        renderFlashlight(currentMouseX, currentMouseY); 
        lucide.createIcons();

    </script>
</body>

</html>
